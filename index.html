    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Sliders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #6cce75;
            --text-color: #fff;
            --ui-bg: rgba(0, 0, 0, 0.4);
            --accent: #ff477e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        html, body { user-select: none !important; -webkit-user-select: none !important; }
        body { background-color: var(--bg-color); overflow: hidden; font-family: 'Press Start 2P', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; transition: background-color 0.5s; }
        canvas { display: block; }
        canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
        .icon-img { width: 1em; height: 1em; vertical-align: middle; image-rendering: pixelated; }
        
        #title-screen, #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 30, 20, 0.7); backdrop-filter: blur(4px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: white; text-align: center; }
        #title-screen h1, #game-over-screen h1 { font-size: 2rem; margin-bottom: 14px; text-shadow: 0 4px 0 rgba(0,0,0,0.5); letter-spacing: 1px; line-height: 1.4; }
        #title-screen p, #game-over-screen p { margin-bottom: 30px; font-size: 0.7rem; line-height: 1.6; text-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        
        .menu-btn { font-size: 0.75rem; padding: 16px 30px; box-shadow: 0 6px 0 rgba(0,0,0,0.3); border-radius: 4px; margin: 10px; min-width: 200px; border: 2px solid rgba(0,0,0,0.35); }
        .menu-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }

        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; z-index: 5;}
        .hud-panel { pointer-events: auto; background: var(--ui-bg); color: var(--text-color); padding: 10px 16px; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-size: 0.7rem; font-weight: bold; border: 2px solid rgba(255,255,255,0.25); }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        #timer-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 180px); max-width: 300px; height: 25px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 3px solid #fff; pointer-events: none; overflow: hidden; }
        #timer-fill { height: 100%; background: linear-gradient(90deg, #ff477e, #ffcf33); width: 100%; transform-origin: left; transition: background 0.3s; }
        #timer-container.danger #timer-fill { background: #ff0000; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #hazard-warning { position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%); display: none; background: rgba(0, 0, 0, 0.7); color: #ff477e; padding: 10px 20px; border-radius: 30px; border: 2px solid #ff477e; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 5px #000; z-index: 10; pointer-events: none; animation: pulse 0.5s infinite; }
        #hazard-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 8; opacity: 0;
            background: radial-gradient(circle, rgba(150,0,0,0) 65%, rgba(120,0,0,0.92) 100%);
            transition: opacity 0.2s linear;
        }

        #time-countdown {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%) scale(1);
            font-size: 4.5rem; color: #ff2222;
            text-shadow: 0 0 20px #ff0000, 0 0 45px #ff0000, 0 4px 0 rgba(0,0,0,0.6);
            z-index: 15; pointer-events: none; display: none;
        }
        .countdown-pop { animation: countdownPop 1s ease-out; }
        @keyframes countdownPop {
            0% { transform: translate(-50%, -50%) scale(1.8); opacity: 0.2; }
            30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }


        #powerup-indicator { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.55); color: #fff; padding: 0; border-radius: 20px; font-weight: bold; pointer-events: none; border: 2px solid rgba(255,255,255,0.6); overflow: hidden; min-width: 220px; max-width: 320px; }
        #pu-fill { position: absolute; top: 0; left: 0; height: 100%; width: 100%; background: #ff6b35; opacity: 0.6; transition: background 0.2s; }
        #pu-content { position: relative; z-index: 2; display: flex; align-items: center; gap: 8px; padding: 8px 16px; width: 100%; }
        #powerup-indicator .pu-icon { font-size: 1.3rem; animation: spinIcon 1s linear infinite; flex-shrink: 0; }
        #pu-desc { font-size: 0.82rem; font-weight: 600; line-height: 1.15; }
        @keyframes spinIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        button { pointer-events: auto; background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-family: 'Press Start 2P', sans-serif; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; touch-action: manipulation; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555 !important; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2b2d42; padding: 30px; border-radius: 6px; text-align: center; color: white; z-index: 60; width: 85%; max-width: 500px; max-height: 80%; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: auto; border: 3px solid rgba(255,255,255,0.15); }
        .modal::-webkit-scrollbar { width: 8px; } .modal::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .modal-header { position: sticky; top: -30px; margin: -30px -30px 15px -30px; padding: 18px 30px; background: #2b2d42; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-radius: 20px 20px 0 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal-header h2 { margin-bottom: 0; }
        .modal-header .close-modal-btn { margin: 0; background: #8d99ae; }
        
        .shop-item, .almanac-item, .setting-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; }
        .skin-preview { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; }
        h2 { margin-bottom: 20px; }
        
        .setting-item input[type="range"] { width: 120px; cursor: pointer; }

        .toggle-btn { 
            padding: 6px 10px; 
            border-radius: 15px; 
            background: #8d99ae; 
            transition: 0.3s; 
            font-size: 0.5rem; 
        }

        .toggle-btn.active { background: #4caf50; }
        
        #game-over-screen { display: none; z-index: 25; }

        .corner-icon { position: absolute; bottom: 30px; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; display: none; justify-content: center; align-items: center; pointer-events: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 50; border: 3px solid #fff; }
        #settings-corner-btn { left: 30px; background: #6c7a89; }
        #almanac-corner-btn { right: 30px; background: #9b59b6; }
        
        #unlock-popup { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #ffcf33; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; z-index: 55; pointer-events: none; opacity: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .pop-anim { animation: unlockAnim 3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Roguelite item HUD badges (top-left, under the Level box) and pickup toast */
        .items-hud { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; max-width: 170px; }
        .item-badge { position: relative; width: 32px; height: 32px; background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .item-badge img { width: 20px; height: 20px; image-rendering: pixelated; }
        .item-badge.rarity-epic { border-color: #9b59b6; box-shadow: 0 0 6px rgba(155,89,182,0.6); }
        .item-badge.rarity-legendary { border-color: #ffcf33; box-shadow: 0 0 6px rgba(255,207,51,0.6); }
        .item-count { position: absolute; bottom: -5px; right: -5px; background: #ff477e; color: #fff; font-size: 0.5rem; padding: 1px 4px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.5); min-width: 12px; text-align: center; line-height: 1.3; }
        #item-toast { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #2b2d42; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 56; pointer-events: none; opacity: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); font-size: 0.7rem; display: flex; align-items: center; gap: 8px; }

        @keyframes unlockAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(50vw - 60px), calc(50vh - 60px)) scale(0); opacity: 0; }
        }

        .enemy-pic { width: 50px; height: 50px; background: rgba(0,0,0,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; flex-shrink: 0; border: 2px solid #fff; }
        .enemy-details { flex-grow: 1; margin-left: 15px; }
        .enemy-name { font-weight: bold; color: #ffcf33; font-size: 1.1rem; }
        .enemy-desc { font-size: 0.85rem; color: #ccc; margin-top: 5px; }
        .locked-entry { filter: grayscale(100%) brightness(0.5); opacity: 0.6; }

        /* Gacha & Inventory UI Styles */
        .shop-tabs { display: flex; justify-content: center; margin-bottom: 15px; gap: 10px; }
        .shop-tab { background: #6c7a89; border: none; padding: 8px 16px; border-radius: 4px; color: white; cursor: pointer; font-size: 0.6rem; font-weight: bold; transition: 0.2s; }
        .shop-tab.active { background: var(--accent); transform: scale(1.05); }
        .gacha-container { position: relative; text-align: center; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .gacha-machine { 
            width: 300px; 
            max-width: 100%; 
            height: 240px; 
            margin: 0 auto 10px; 
            border-radius: 12px; 
            border: 4px solid #34495e; 
            position: relative; 
            overflow: hidden; 
            display: block; 
            background: #111318; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); 
            box-sizing: border-box;
        }
        .gacha-machine.shaking { animation: gachaShake 0.4s infinite; border-color: #ffcf33; }
        
        #gacha-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .gacha-btn { font-size: 0.7rem; padding: 15px 20px; background: #ffcf33; color: #000; border: 2px solid rgba(0,0,0,0.3); border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #ccac00; transition: transform 0.1s; margin-bottom: 6px; width: 80%; max-width: 300px; }
        .gacha-btn:active { transform: translateY(5px); box-shadow: none; }
        .gacha-btn:disabled { background: #555; color: #888; box-shadow: 0 5px 0 #333; cursor: not-allowed; }
        
        .shop-coin-bag { margin: 4px auto 0 auto; padding: 6px 18px; background: linear-gradient(135deg, #2c3e50, #34495e); border: 2px solid #f1c40f; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; color: #f1c40f; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #gacha-reveal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            pointer-events: auto; 
            z-index: 1000; 
            background: rgba(8, 10, 18, 0.9); 
            cursor: pointer;
        }
        
        .reveal-visual { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
        .sun-rays { position: absolute; top: 50%; left: 50%; width: 320px; height: 320px; transform: translate(-50%, -50%); background: repeating-conic-gradient(from 0deg, rgba(241,196,15,0.28) 0deg 15deg, transparent 15deg 30deg); z-index: 1; animation: gacha-spin 12s linear infinite; border-radius: 50%; pointer-events: none; }
        #gacha-reveal-canvas { position: relative; z-index: 2; pointer-events: none; }
        .gacha-result { font-size: 1.3rem; font-weight: bold; min-height: 30px; text-shadow: 0 2px 5px #000; pointer-events: none; text-align: center; color: #fff; }
        .gacha-result span.duplicate { color: #ffcf33; font-size: 0.9rem; display: block; margin-top: 5px; }

        .inventory-container { display: none; }
        .inventory-section-title { text-align: left; margin: 15px 0 10px 5px; font-size: 1.1rem; color: #ffcf33; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; max-height: 350px; overflow-y: auto; padding: 5px; }
        .inventory-grid::-webkit-scrollbar { width: 6px; }
        .inventory-grid::-webkit-scrollbar-thumb { background: #ffcf33; border-radius: 3px; }
        .inv-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; touch-action: manipulation; }
        .inv-item:hover { background: rgba(255,255,255,0.2); }
        .inv-item.equipped { border-color: #4caf50; background: rgba(76, 175, 80, 0.2); }
        .inv-item.locked { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
        .inv-preview { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 8px; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .inv-name { 
            font-size: 0.75rem; 
            font-weight: bold; 
            overflow-wrap: normal; 
            word-break: keep-all; 
            line-height: 1.2; 
        }

        .inv-count { position: absolute; top: -5px; right: -5px; background: #ffcf33; color: #000; font-size: 0.7rem; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #2b2d42; }

        @keyframes gacha-spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes gachaShake { 0% { transform: translate(2px, 2px) rotate(0deg); } 25% { transform: translate(-2px, -2px) rotate(-2deg); } 50% { transform: translate(-4px, 0px) rotate(2deg); } 75% { transform: translate(4px, 2px) rotate(0deg); } 100% { transform: translate(2px, -2px) rotate(-2deg); } }
        @keyframes gachaPop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .anim-pop { animation: gachaPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>


</head>
<body>
    <div id="title-screen">
        <h1>SLIME SLIDERS</h1>
        <p>Swipe to move. Collect coins to unlock the Goal!</p>
        <button id="play-btn" class="menu-btn" style="background: var(--accent)">Play</button>
        <button id="title-shop-btn" class="menu-btn" style="background: #ffd700; color: #000;">Shop</button>
        <button id="title-settings-btn" class="menu-btn" style="background: #6c7a89;">Settings</button>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff477e;">GAME OVER</h1>
        <p id="death-reason" style="color: #ffcf33; font-weight: bold;"></p>

    <script>

        // ==========================================
        // SECTION 2 - GLOBAL STATE & DATA DEFINITIONS
        // Handles canvas setup, persistent storage, 
        // global variables, config files, and entity arrays.
        // ==========================================
        // Visible on-page canvas — what the player actually sees.
        const displayCanvas = document.getElementById('gameCanvas');
        const displayCtx = displayCanvas.getContext('2d');
        // Offscreen buffer the game draws to, at full resolution. Camera/world math is completely
        // unchanged, so this never affects zoom or field-of-view.
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        // Tiny offscreen canvas used purely to downsample the buffer for the chunky pixel look.
        const pixelCanvas = document.createElement('canvas');
        const pixelCtx = pixelCanvas.getContext('2d');
        const PIXEL_SCALE = 2; // higher = chunkier "8-bit" pixels; does not change what's visible
        
        const memoryStorage = {};
        const storage = {
            get: (key) => { try { return localStorage.getItem(key) ?? memoryStorage[key]; } catch(e) { return memoryStorage[key] || null; } },
            set: (key, val) => { memoryStorage[key] = val; try { localStorage.setItem(key, val); } catch(e) {} }
        };

        // Cached DOM references for the HUD, so the hot game loop never has to call
        // getElementById repeatedly (that lookup + the layout writes below it were a major
        // source of frame hitches, especially while a powerup was active).

        const domRefs = {
            levelDisplay: document.getElementById('level-display'),
            coinDisplay: document.getElementById('coin-display'),
            timerFill: document.getElementById('timer-fill'),
            timerContainer: document.getElementById('timer-container'),
            powerupIndicator: document.getElementById('powerup-indicator'),
            puIcon: document.getElementById('pu-icon'),
            puDesc: document.getElementById('pu-desc'),
            puFill: document.getElementById('pu-fill'),
            hazardWarning: document.getElementById('hazard-warning'),
            itemsHud: document.getElementById('items-hud'),
            hazardVignette: document.getElementById('hazard-vignette'),
            timeCountdown: document.getElementById('time-countdown')
        };

// Tracks the last whole-second value shown by the dramatic time countdown, and whether the
// music is currently pitched up for the "final ten seconds" danger state, so both can be
// restored cleanly on level change / reset / game over.
        let lastCountdownSecond = -1;
        let musicSped = false;


        // Coin total is only flushed to localStorage periodically instead of on every single
        // pickup, since localStorage.setItem is synchronous and can stall a frame when several
        // coins are collected in quick succession (e.g. after destroying an enemy).
        let coinsDirty = false;
        let coinFlushTimer = 0;
        function markCoinsDirty() { coinsDirty = true; }
        function flushCoinsIfDirty() {
            if (coinsDirty) { storage.set('landSlidersCoins', totalCoins); coinsDirty = false; }
        }

        // PERF: every spatial-hash grid below (trees/decorations/fences/land-tiles/safe-cache)
        // used to key its Map with a template-string concatenation ("cx + '_' + cy"). That
        // allocates a brand-new string and re-hashes its characters on every single lookup -
        // and lookups happen dozens of times per entity per tick (9 buckets per query x every
        // tree/fence/projectile/enemy check, every frame). Packing the two integers into one
        // number instead gives V8 a plain integer Map key: no allocation, no string hashing,
        // just numeric equality. Safe for any coordinate/cell-index magnitude this game
        // produces (levels are nowhere near the ~5,000,000-unit bound this leaves headroom for).
        function packGridKey(a, b) { return a * 10000000 + b; }

        // Memoizes isSafe() results for the fixed grid-dust decoration pass in draw(), since
        // those world coordinates repeat across many consecutive frames as the camera pans and
        // isSafe() itself has to scan every land blob. Cleared whenever a new level is generated.
        let safeGridCache = new Map();
        function isSafeGridCached(x, y) {
            let key = packGridKey(x, y);
            let cached = safeGridCache.get(key);
            if (cached !== undefined) return cached;
            let result = isSafe(x, y);
            safeGridCache.set(key, result);
            return result;
        }

        // Spatial hash grid for trees. Built once per level (after all trees are placed) and
        // used by the collision checks in update() so they only test trees near the entity in
        // question instead of scanning the entire trees array every tick. Tree count is set
        // randomly at level generation and can range from ~100 to 300+, so uncoiled full scans
        // (done every physics tick, for the player, every near-screen enemy, and every
        // projectile) were a major and very level-dependent source of sustained lag.
        const treeGridSize = 150;
        let treeGrid = new Map();
        function buildTreeGrid() {
            treeGrid = new Map();
            for (let t of trees) {
                let key = packGridKey(Math.floor(t.x / treeGridSize), Math.floor(t.y / treeGridSize));
                let bucket = treeGrid.get(key);
                if (!bucket) { bucket = []; treeGrid.set(key, bucket); }
                bucket.push(t);
            }
        }
        // Reused scratch array to avoid allocating a new array on every call (this runs very
        // often - once per entity per tick). Safe because each call's result is consumed
        // immediately and synchronously before the next call overwrites it.
        let treeQueryResult = [];
        function getNearbyTrees(x, y) {
            treeQueryResult.length = 0;
            let cx = Math.floor(x / treeGridSize), cy = Math.floor(y / treeGridSize);
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    let bucket = treeGrid.get(packGridKey(cx + dx, cy + dy));
                    if (bucket) for (let i = 0; i < bucket.length; i++) treeQueryResult.push(bucket[i]);
                }
            }
            return treeQueryResult;
        }
        // PERF: generic "give me everything in this rectangular region" query over a
        // grid-bucketed array, used at draw time so trees/decorations only need to check
        // isOnScreen against a small handful of nearby candidates instead of the entire
        // (100-4000+ entry) array every single frame. gridSize must match the grid the
        // buckets were built with (treeGridSize / decorGridSize below).
        function queryGridRange(grid, cellSize, x0, y0, x1, y1, out) {
            out.length = 0;
            let cx0 = Math.floor(x0 / cellSize), cx1 = Math.floor(x1 / cellSize);
            let cy0 = Math.floor(y0 / cellSize), cy1 = Math.floor(y1 / cellSize);
            for (let cx = cx0; cx <= cx1; cx++) {
                for (let cy = cy0; cy <= cy1; cy++) {
                    let bucket = grid.get(packGridKey(cx, cy));
                    if (bucket) for (let i = 0; i < bucket.length; i++) out.push(bucket[i]);
                }
            }
            return out;
        }
        let treeViewResult = [];
        function getTreesInView(x0, y0, x1, y1) {
            return queryGridRange(treeGrid, treeGridSize, x0, y0, x1, y1, treeViewResult);
        }
        // Decorations (grass/flower/leaf specks scattered across every land tile, 2-4 per tile
        // - easily thousands on a large level) get their own coarser grid. They're static and
        // rebuilt once per generateLevel(), same lifecycle as trees.
        const decorGridSize = 300;
        let decorGrid = new Map();
        function buildDecorGrid() {
            decorGrid = new Map();
            for (let d of decorations) {
                let key = packGridKey(Math.floor(d.x / decorGridSize), Math.floor(d.y / decorGridSize));
                let bucket = decorGrid.get(key);
                if (!bucket) { bucket = []; decorGrid.set(key, bucket); }
                bucket.push(d);
            }
        }
        let decorViewResult = [];
        function getDecorationsInView(x0, y0, x1, y1) {
            return queryGridRange(decorGrid, decorGridSize, x0, y0, x1, y1, decorViewResult);
        }

        // Spatial hash grid for fences (same pattern as the tree grid above). Fences are solid -
        // entities get pushed back out along the fence's normal, same shape of check as tree
        // collision but against a line segment instead of a circle.
        const fenceGridSize = 150;
        let fenceGrid = new Map();
        function buildFenceGrid() {
            fenceGrid = new Map();
            for (let f of fences) {
                let key = packGridKey(Math.floor(f.midX / fenceGridSize), Math.floor(f.midY / fenceGridSize));
                let bucket = fenceGrid.get(key);
                if (!bucket) { bucket = []; fenceGrid.set(key, bucket); }
                bucket.push(f);
            }
        }
        let fenceQueryResult = [];
        function getNearbyFences(x, y) {
            fenceQueryResult.length = 0;
            let cx = Math.floor(x / fenceGridSize), cy = Math.floor(y / fenceGridSize);
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    let bucket = fenceGrid.get(packGridKey(cx + dx, cy + dy));
                    if (bucket) for (let i = 0; i < bucket.length; i++) fenceQueryResult.push(bucket[i]);
                }
            }
            return fenceQueryResult;
        }
        // Spatial hash grid for land/hole hex tiles (same pattern as the tree/decoration grids
        // above). PERF: computeVisibleLandTiles() and drawHazardHoles() used to linear-scan the
        // *entire* landHexList/holeHexList every single frame just to run isOnScreen() on each
        // tile - by far the single highest call-count function in the perf report (isOnScreen:
        // ~8M calls/session). Map size grows with level (up to 9 overlapping blobs at radius
        // 250-500 by level 20), so that scan cost scales with total level area, not with what's
        // actually visible. Bucketing once per generateLevel() and querying only the handful of
        // cells overlapping the camera brings both down to a small, roughly constant number of
        // isOnScreen checks regardless of how big the level is - mirrors getTreesInView /
        // getDecorationsInView exactly.
        const landTileGridSize = HEX_SIZE * 4;
        let landTileGrid = new Map();
        let holeTileGrid = new Map();
        function buildLandTileGrid() {
            landTileGrid = new Map();
            holeTileGrid = new Map();
            for (let t of landHexList) {
                let key = packGridKey(Math.floor(t.x / landTileGridSize), Math.floor(t.y / landTileGridSize));
                let bucket = landTileGrid.get(key);
                if (!bucket) { bucket = []; landTileGrid.set(key, bucket); }
                bucket.push(t);
            }
            for (let t of holeHexList) {
                let key = packGridKey(Math.floor(t.x / landTileGridSize), Math.floor(t.y / landTileGridSize));
                let bucket = holeTileGrid.get(key);
                if (!bucket) { bucket = []; holeTileGrid.set(key, bucket); }
                bucket.push(t);
            }
        }
        let landTileViewResult = [];
        function getLandTilesInView(x0, y0, x1, y1) {
            return queryGridRange(landTileGrid, landTileGridSize, x0, y0, x1, y1, landTileViewResult);
        }
        let holeTileViewResult = [];
        function getHoleTilesInView(x0, y0, x1, y1) {
            return queryGridRange(holeTileGrid, landTileGridSize, x0, y0, x1, y1, holeTileViewResult);
        }

        // Pushes (x, y) back out of any nearby fence segment it's overlapping (within `radius` of
        // the segment plus the fence's own thickness), and returns the corrected point. Used by
        // the player and enemies each tick so fences act as solid walls rather than decoration.
        const fenceThickness = 10;
        function resolveFenceCollision(x, y, radius) {
            let nearFences = getNearbyFences(x, y);
            for (let i = 0; i < nearFences.length; i++) {
                let f = nearFences[i];
                let dx = f.x2 - f.x1, dy = f.y2 - f.y1;
                let lenSq = dx*dx + dy*dy;
                let t = lenSq > 0 ? ((x - f.x1) * dx + (y - f.y1) * dy) / lenSq : 0;
                t = Math.max(0, Math.min(1, t));
                let cx = f.x1 + t * dx, cy = f.y1 + t * dy;
                let ex = x - cx, ey = y - cy;
                let distSq = ex*ex + ey*ey;
                let threshold = radius + fenceThickness;
                if (distSq < threshold * threshold) {
                    let d = Math.sqrt(distSq);
                    if (d < 0.0001) { ex = 1; ey = 0; d = 1; } // degenerate: sitting exactly on the segment
                    let overlap = threshold - d;
                    x += (ex / d) * overlap;
                    y += (ey / d) * overlap;
                }
            }
            return { x, y };
        }

        // Persistent pool of render-queue entries. Every frame previously allocated a brand new
        // {type, obj} wrapper object for every single visible tree/enemy/item/particle, plus a
        // new array from items.filter()/powerups.filter(), plus 10+ new forEach closures, plus a
        // sort() comparator closure that recomputed each object's y-position on every comparison.
        // That ran unconditionally every frame regardless of powerups or cosmetics, generating a
        // constant stream of garbage for the GC to clean up - this pool eliminates virtually all
        // of that allocation in steady state by reusing the same wrapper objects across frames.
        const renderQueuePool = [];
        let renderQueue = [];
        let rqCount = 0;
        function pushRQ(type, obj, sortY) {
            let entry = renderQueuePool[rqCount];
            if (!entry) { entry = { type: null, obj: null, sortY: 0 }; renderQueuePool[rqCount] = entry; }
            entry.type = type; entry.obj = obj; entry.sortY = sortY;
            renderQueue[rqCount] = entry;
            rqCount++;
        }
        function rqSortCompare(a, b) { return a.sortY - b.sortY; }

        // PERF: gradient caches for per-particle effects drawn every frame (icicles, flame
        // particles - see the render loop in SECTION 8). CanvasGradient objects are relatively
        // expensive to build, and these were being rebuilt from scratch for every single
        // particle on every single frame - a burst-spawning item (e.g. Spikes' ice-nova volley)
        // can have a dozen+ alive at once, all needing a gradient every tick just to stay drawn.
        // Reused/bucketed here instead - see the icicle/flame branches of the render loop for
        // why each one is safe to cache (identical output every time vs. bucketed by size).
        let icicleGradientCache = null;
        const flameGradientCache = new Map();
        // PERF: see drawSkyBackground (SECTION 8) - both cached the same way, keyed off
        // canvas.height so a resize correctly invalidates and rebuilds them.
        let skyGradientCache = null;
        let skyGradientCacheH = -1;
        let sunGradientCache = null;

        let gameState = 'title';
        let previousState = 'title';
        // True from the moment the first level is pre-generated on page load until it's
        // actually consumed by startGame() - see the bottom of this script and startGame().
        let levelPreGenerated = false;
        let level = 1;
        let score = 0;
        let totalCoins = parseInt(storage.get('landSlidersCoins')) || 0;
        let highestLevel = parseInt(storage.get('landSlidersBestLevel')) || 1;
        
        let timeLeft = 30;
        let MAX_TIME = 30;
        let screenShake = 0;
        // prevX/prevY hold the camera's position as of the start of the current physics tick;
        // x/y hold it after this tick's smoothing lerp runs. draw() blends between the two using
        // renderAlpha (see SECTION 9) so panning stays smooth even when an uneven number of
        // physics ticks land between rendered frames (e.g. under throttled rAF / Low Power Mode).
        let camera = { x: 0, y: 0, prevX: 0, prevY: 0 };
        const friction = 0.92;
        const sensitivity = 0.08;
        
        let userSettings = {
            musicVol: parseFloat(storage.get('ls_music') ?? 0.3),
            sfxVol: parseFloat(storage.get('ls_sfx') ?? 0.5),
            invert: storage.get('ls_invert') !== 'false'
        };

        let player = {
            worldX: 0, worldY: 0, prevWorldX: 0, prevWorldY: 0, vx: 0, vy: 0, radius: 22,
            color: storage.get('landSlidersSkin') || 'cyan',
            hat: storage.get('landSlidersHat') || null,
            jiggleForceX: 0, jiggleForceY: 0, activePowerup: null, powerupDuration: 0,
            powerupTimeLeft: 0, powerupTickTimer: 0, facing: 0, hazardTimer: 0, spikesTimer: 0
        };

        let pointerScreenX = window.innerWidth / 2; 
        let pointerScreenY = window.innerHeight / 2;
        
        // Entity Arrays
        // Hex-grid terrain: hexTiles maps "q,r" -> {q,r,x,y,type:'land'|'hole',element,hasFence,fenceDirs}.
        // landHexList/holeHexList are derived flat arrays (rebuilt each level) kept around so hot
        // paths (isSafe, drawing, spawning) don't have to filter the map every time.
        let hexTiles = new Map(); let landHexList = []; let holeHexList = []; let borderHexList = [];
        let fences = [];
        let items = []; let enemies = []; let trees = []; let hives = [];
        let projectiles = []; let icicles = []; let flameParticles = []; let leaves = [];
        let splashes = []; let decorations = []; let powerups = []; let chest = null;

        // Roguelite run-items state: items acquired from chests/mimics that persist and stack
        // for the duration of a run (cleared on resetGame(), re-applied fresh each level).
        let runItems = {};
        let companions = [];
        let playerTrail = [];
        let shurikenSpin = 0;
        const roguelikeItemDefs = {
            magnet:      { id: 'magnet',      rarity: 'common',    name: 'Magnet' },
            wings:       { id: 'wings',       rarity: 'common',    name: 'Wings' },
            spikes:      { id: 'spikes',      rarity: 'common',    name: 'Spikes' },
            slimefriend: { id: 'slimefriend', rarity: 'epic',      name: 'Slime Squad' },
            shuriken:    { id: 'shuriken',    rarity: 'legendary', name: 'Shuriken' }
        };
        
        let goal = { x: 0, y: 0, radius: 45, active: true, required: 5, collected: 0 };
        const gridSize = 120; let isDragging = false; let lastX = 0, lastY = 0;

        // Configurations
        const themes = [
            { name: "Forest", bg: "#6cce75", grid: "#5eb867", treeBase: "#795548", treeTop: "#2d7a31", rock: "#95a5a6", decorColors: ['#5eb867', '#4da956', '#a2d149'], hazard: { type: 'water', color: '#1ca3ec', edge: '#7fd8ff' } },
            { name: "Desert", bg: "#e9c46a", grid: "#d4a84b", treeBase: "#2a9d8f", treeTop: "#264653", rock: "#e76f51", decorColors: ['#d4a84b', '#c2963a', '#e0c073'], hazard: { type: 'lava', color: '#ff4500', edge: '#ffae42' } }, 
            { name: "Snow", bg: "#caf0f8", grid: "#ade8f4", treeBase: "#5c4033", treeTop: "#ffffff", rock: "#8d99ae", decorColors: ['#ffffff', '#ade8f4', '#e0f7fa'], hazard: { type: 'ice', color: '#0a2e44', edge: '#bfe9f7' } },
            { name: "Volcano", bg: "#3d3d3d", grid: "#2e2e2e", treeBase: "#4a3728", treeTop: "#8b2500", rock: "#1a1a1a", decorColors: ['#ff4500', '#8b0000', '#4a4a4a'], hazard: { type: 'lava', color: '#ff2200', edge: '#ffcc00' } },
            { name: "Swamp", bg: "#4a5d3a", grid: "#3d4d30", treeBase: "#3e2f1c", treeTop: "#5c6e3f", rock: "#5a5a4a", decorColors: ['#3d4d30', '#6b7a4f', '#2f3d24'], hazard: { type: 'water', color: '#3a4a2a', edge: '#6b7a4f' } },
            { name: "Autumn", bg: "#e08a3e", grid: "#c9762f", treeBase: "#6b4226", treeTop: "#c1440e", rock: "#a67c52", decorColors: ['#c9762f', '#e0a83e', '#b5651d'], hazard: { type: 'water', color: '#2e6f8e', edge: '#6fa8c9' } }
        ];
        let currentTheme = themes[0];

        const enemyDB = {
            wanderer: { name: 'Slime', desc: 'Legend has it that eating slime can grant eternal life… Yuck.' },
            dasher:   { name: 'Bull', desc: 'Charges blindly. Easy to trick.' },
            chaser:   { name: 'Bee', desc: 'Defends its hive. Don’t get too close!' },
            shooter:  { name: 'Turret Eye', desc: 'Keeps its distance and fires slow-moving plasma orbs.' },
            hopper:   { name: 'Frog', desc: 'Targets a fly and jumps high to catch it. Apparently can’t swim.' },
            mimic:    { name: 'Chest Mimic', desc: 'Curiosity killed the… Slime?' }
        };

        const powerupTypes = [

        // ==========================================
        // SECTION 3 - AUDIO ENGINE
        // Sound effects still use the Web Audio API (procedural synthesis). Background music
        // is played through TWO <audio> elements - the normal loop, and a separate pre-rendered
        // "danger" stinger for the final ten seconds - routed into Web Audio via
        // MediaElementAudioSourceNode so volume is controlled with GainNodes instead of
        // element.volume.
        //
        // Why: iOS Safari silently ignores HTMLMediaElement.volume (hardware buttons take
        // precedence over JS-controlled volume by design), which is why the music slider had
        // no effect on iOS. Routing through a GainNode sidesteps that restriction entirely.
        //
        // Design note: earlier versions tried to speed up the SAME track via playbackRate and
        // crossfade into it, which required re-syncing the two elements' currentTime to the
        // same musical position right before every crossfade - and that resync (an active seek
        // on a playing element) was audibly glitchy no matter how few times it ran. The danger
        // stinger is a distinct short audio file per track that always starts fresh from 0 when
        // the crossfade begins, so there is no position to keep in sync and nothing to seek -
        // the crossfade is a pure gain ramp between two already-correctly-positioned elements.
        // ==========================================
        let actx = null;
        let audioGraphReady = false;
        let musicGainMaster, gainNormal, gainFast, sfxGainBus;

        // Background music: one file per theme/level track, same order as `themes`/level index.
        const musicFiles = ['audio/forest.mp3', 'audio/desert.mp3', 'audio/snow.mp3', 'audio/volcano.mp3', 'audio/swamp.mp3', 'audio/autumn.mp3'];
        // Matching "final ten seconds" danger stinger per track. These are separate, pre-made
        // audio files (not the same song sped up at runtime) - point them at real assets before
        // shipping. If you'd rather use one shared stinger for every theme, just repeat the
        // same path in every slot.
        const musicFilesDanger = ['audio/forest_danger.mp3', 'audio/desert_danger.mp3', 'audio/snow_danger.mp3', 'audio/volcano_danger.mp3', 'audio/swamp_danger.mp3', 'audio/autumn_danger.mp3'];
        let currentTrack = 0;
        const musicRampSeconds = 0.4; // time to glide between normal and danger music
        let musicDangerActive = false;
        let dangerFadeToken = 0; // bumped on every setMusicDanger() call; lets a delayed pause() no-op if re-triggered mid-fade

        const musicPlayerNormal = new Audio();
        musicPlayerNormal.loop = true;
        musicPlayerNormal.preload = 'auto';
        musicPlayerNormal.playsInline = true;

        const musicPlayerFast = new Audio();
        musicPlayerFast.loop = true;
        musicPlayerFast.preload = 'auto';
        musicPlayerFast.playsInline = true;

        // Builds the Web Audio graph exactly once, on the first user-gesture-triggered call to
        // initAudio(). Must happen after a gesture or the AudioContext is created suspended.
        function setupAudioGraph() {
            if (audioGraphReady) return;
            actx = new (window.AudioContext || window.webkitAudioContext)();

            musicGainMaster = actx.createGain();
            musicGainMaster.gain.value = userSettings.musicVol;
            musicGainMaster.connect(actx.destination);

            gainNormal = actx.createGain();
            gainNormal.gain.value = 1;
            gainNormal.connect(musicGainMaster);

            gainFast = actx.createGain();
            gainFast.gain.value = 0;
            gainFast.connect(musicGainMaster);

            actx.createMediaElementSource(musicPlayerNormal).connect(gainNormal);
            actx.createMediaElementSource(musicPlayerFast).connect(gainFast);

            sfxGainBus = actx.createGain();
            sfxGainBus.gain.value = 1;
            sfxGainBus.connect(actx.destination);

            audioGraphReady = true;
        }

        // Loads the normal track and starts it immediately; loads (but does not play) its
        // danger stinger, ready to start from 0 the instant it's needed. Safe to call before
        // the audio graph exists (e.g. pre-generating the first level on page load, before any
        // user gesture) - it just primes the elements silently and playback naturally starts
        // once initAudio() unlocks things on the first tap.
        function playMusicTrack(idx) {
            currentTrack = idx;
            musicPlayerNormal.src = musicFiles[idx];
            musicPlayerFast.src = musicFilesDanger[idx];
            musicPlayerNormal.currentTime = 0;
            musicPlayerFast.currentTime = 0;
            musicDangerActive = false;
            musicSped = false;
            dangerFadeToken++;
            if (audioGraphReady) {
                let now = actx.currentTime;
                gainNormal.gain.cancelScheduledValues(now); gainNormal.gain.setValueAtTime(1, now);
                gainFast.gain.cancelScheduledValues(now); gainFast.gain.setValueAtTime(0, now);
                musicPlayerFast.pause();
                musicPlayerNormal.play().catch(() => {});
            }
        }

        // Crossfades between the normal music and the danger stinger using scheduled gain
        // ramps (smooth and glitch-free). The stinger always starts from position 0, so there
        // is nothing to keep in sync between the two elements - just a gain ramp.
        function setMusicDanger(active) {
            if (active === musicDangerActive) return;
            musicDangerActive = active;
            musicSped = active;
            dangerFadeToken++;
            let myFadeToken = dangerFadeToken;
            if (!audioGraphReady) return;
            if (musicPlayerNormal.paused) musicPlayerNormal.play().catch(() => {});
            if (active) {
                // Fresh start every time - this is the whole reason no resync is needed.
                musicPlayerFast.currentTime = 0;
                musicPlayerFast.play().catch(() => {});
            }
            let now = actx.currentTime;
            // Ramp from wherever the gains currently sit (not a hardcoded endpoint) so
            // re-triggering mid-fade never pops.
            gainNormal.gain.cancelScheduledValues(now); gainNormal.gain.setValueAtTime(gainNormal.gain.value, now);
            gainFast.gain.cancelScheduledValues(now); gainFast.gain.setValueAtTime(gainFast.gain.value, now);
            gainNormal.gain.linearRampToValueAtTime(active ? 0 : 1, now + musicRampSeconds);
            gainFast.gain.linearRampToValueAtTime(active ? 1 : 0, now + musicRampSeconds);
            if (!active) {
                // Once the fade-out finishes, stop the stinger so it's not silently decoding in
                // the background - unless another crossfade has since started (token changed).
                setTimeout(() => {
                    if (dangerFadeToken === myFadeToken) musicPlayerFast.pause();
                }, musicRampSeconds * 1000 + 50);
            }
        }

        function initAudio() {

        function playSFX(type, pitchMult = 1) {

        function manageBeeBuzzing() {
            if (!actx || userSettings.sfxVol <= 0 || gameState !== 'playing') {
                if (beeBuzzOsc) { beeBuzzOsc.stop(); beeBuzzOsc = null; }
                return;
            }
            // PERF: was `enemies.filter(...)` + `.some(...)`, allocating a fresh array every
            // physics tick just to check two booleans. A single manual pass gets the same
            // result with zero allocation.
            let hasActiveBee = false, isChasing = false;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e.type === 'chaser' && isOnScreen(e.x, e.y, 100)) {
                    hasActiveBee = true;
                    if (e.state === 'chase') { isChasing = true; break; }
                }
            }
            if (hasActiveBee) {
                if (!beeBuzzOsc) {
                    beeBuzzOsc = actx.createOscillator(); beeBuzzGain = actx.createGain();
                    beeBuzzGain.gain.setValueAtTime(0, actx.currentTime); 
                    beeBuzzOsc.connect(beeBuzzGain); beeBuzzGain.connect(actx.destination);
                    beeBuzzOsc.type = 'triangle'; beeBuzzOsc.start();
                }
                let targetFreq = isChasing ? 220 : 130; 
                let targetVol = isChasing ? (userSettings.sfxVol * 0.15) : (userSettings.sfxVol * 0.05); 
                let t = actx.currentTime;
                beeBuzzOsc.frequency.setTargetAtTime(targetFreq + Math.sin(Date.now()/50)*15, t, 0.1);
                beeBuzzGain.gain.setTargetAtTime(targetVol, t, 2.0);
            } else {
                if (beeBuzzOsc) {
                    beeBuzzGain.gain.setTargetAtTime(0.001, actx.currentTime, 0.1);
                    setTimeout(() => { if (beeBuzzOsc) { beeBuzzOsc.stop(); beeBuzzOsc = null; } }, 200);
                }
            }
        }
        let beeBuzzOsc = null;
        let beeBuzzGain = null;

        // ==========================================
        // SECTION 4 - MATH & UTILITIES
        // Helper functions for collisions, angle normalization,
        // and screen space calculations.
        // ==========================================
        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
        function isOnScreen(x, y, buffer) { 
            buffer = buffer || 50; 
            return x > camera.x - buffer && x < camera.x + canvas.width + buffer && y > camera.y - buffer && y < camera.y + canvas.height + buffer;
        }
        function isNearScreen(x, y, buffer = 0) {
            let w = canvas.width * 2; let h = canvas.height * 2;
            return x > camera.x - w - buffer && x < camera.x + canvas.width + w + buffer && y > camera.y - h - buffer && y < camera.y + canvas.height + h + buffer;
        }
        function normalizeAngle(a) { 
            while (a > Math.PI) a -= Math.PI*2; 
            while (a < -Math.PI) a += Math.PI*2; return a; 
        }
        function distToSegment(px, py, ax, ay, bx, by) {
            let dx = bx - ax, dy = by - ay, lenSq = dx*dx + dy*dy;
            let t = lenSq > 0 ? ((px - ax) * dx + (py - ay) * dy) / lenSq : 0;
            t = Math.max(0, Math.min(1, t));
            return dist(px, py, ax + dx * t, ay + dy * t);
        }

        // ---- Hex grid math (pointy-top, axial coordinates) ----
        // Tile size mirrors the goal's footprint, per design: "smaller (the size of the goal)"
        const HEX_SIZE = 48;
        const HEX_DIRS = [{q:1,r:0},{q:1,r:-1},{q:0,r:-1},{q:-1,r:0},{q:-1,r:1},{q:0,r:1}];
        function hexKey(q, r) { return q + ',' + r; }
        function axialToPixel(q, r) { return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2), y: HEX_SIZE * 1.5 * r }; }
        function pixelToAxial(x, y) {
            let q = (x * Math.sqrt(3)/3 - y/3) / HEX_SIZE;
            let r = (y * 2/3) / HEX_SIZE;
            // cube rounding to the nearest hex
            let cx = q, cz = r, cy = -cx - cz;
            let rx = Math.round(cx), ry = Math.round(cy), rz = Math.round(cz);
            let dx = Math.abs(rx - cx), dy = Math.abs(ry - cy), dz = Math.abs(rz - cz);
            if (dx > dy && dx > dz) rx = -ry - rz; else if (dy > dz) ry = -rx - rz; else rz = -rx - ry;
            return { q: rx, r: rz };
        }
        function hexCorners(cx, cy) {
            let pts = [];
            for (let i = 0; i < 6; i++) {
                let a = (Math.PI / 180) * (60 * i - 30);
                pts.push({ x: cx + HEX_SIZE * Math.cos(a), y: cy + HEX_SIZE * Math.sin(a) });
            }
            return pts;
        }
        // Returns the two corner points of the edge tile shares with its neighbor in direction
        // (dq,dr), found by looking 30 degrees either side of the direction to the neighbor's
        // center - robust regardless of how hexCorners indexes its corners.
        function hexEdgeCorners(tile, dq, dr) {
            let n = axialToPixel(tile.q + dq, tile.r + dr);
            let a = Math.atan2(n.y - tile.y, n.x - tile.x);
            let a1 = a - Math.PI/6, a2 = a + Math.PI/6;
            return [
                { x: tile.x + HEX_SIZE * Math.cos(a1), y: tile.y + HEX_SIZE * Math.sin(a1) },
                { x: tile.x + HEX_SIZE * Math.cos(a2), y: tile.y + HEX_SIZE * Math.sin(a2) }
            ];
        }
        // PERF: tile corner points only depend on a tile's fixed (x,y) center, so they're
        // computed once and cached on the tile object itself (tile.corners) instead of being
        // re-derived with 6 Math.cos/Math.sin calls every single time a tile is pathed. Hex
        // tiles never move once a level is generated, so this cache is valid for the tile's
        // entire lifetime and is cleared automatically when generateLevel() rebuilds the lists.
        function cachedHexCorners(tile) {
            return tile.corners || (tile.corners = hexCorners(tile.x, tile.y));
        }
        function pathHexUnion(ctx, tileList) {
            ctx.beginPath();
            for (let tile of tileList) {
                let c = cachedHexCorners(tile);
                ctx.moveTo(c[0].x, c[0].y);
                for (let i = 1; i < 6; i++) ctx.lineTo(c[i].x, c[i].y);
                ctx.closePath();
            }
        }
        // PERF: draw() calls pathHexUnion(ctx, landHexList) twice per frame (once to fill the
        // ground base, once to stroke the grid-dust clip region). Previously each call
        // independently re-scanned the *entire* landHexList and ran isOnScreen() on every tile,
        // even tiles nowhere near the camera - on a large level this was by far the single
        // biggest per-frame cost (see perf report: pathHexUnion + isOnScreen + hexCorners).
        // Now the on-screen subset is computed once per frame into a reused array (no per-frame
        // allocation) and both pathHexUnion calls just consume that pre-filtered list.
        let visibleLandTiles = [];
        function computeVisibleLandTiles() {
            visibleLandTiles.length = 0;
            let buf = HEX_SIZE * 2;
            // PERF: narrow to the grid cells overlapping the viewport first (see
            // buildLandTileGrid) instead of scanning every land tile in the level, then run the
            // exact same isOnScreen check only on those candidates - identical visual result.
            let candidates = getLandTilesInView(
                camera.x - buf, camera.y - buf,
                camera.x + canvas.width + buf, camera.y + canvas.height + buf
            );
            for (let i = 0; i < candidates.length; i++) {
                let tile = candidates[i];
                if (isOnScreen(tile.x, tile.y, buf)) visibleLandTiles.push(tile);
            }
            return visibleLandTiles;
        }

        // ---- Hand-drawn pixel-icon sprites (replaces all emoji) ----
        function drawPixelIcon(type, tctx, x, y, size) {
            tctx.save(); tctx.translate(x, y);
            const s = size / 24;

            // Externalized icon sprites (see sprites/ folder): almanac + settings icons,
            // roguelite item badge icons, and the small enemy-almanac icon versions all live
            // in their own files now and register themselves on window.IconSprites, keyed by
            // type. Anything found there is drawn and we're done; anything else falls through
            // to the inline cases still living below (mirrors how enemies dispatch to
            // window.EnemySprites in SECTION 8).
            if (window.IconSprites && window.IconSprites[type]) {
                window.IconSprites[type](tctx, s);
                tctx.restore();
                return;
            }

            function starPath(r1, r2, points) {
                tctx.beginPath();
                for (let i = 0; i < points * 2; i++) {
                    let r = i % 2 === 0 ? r1 : r2;
                    let a = (Math.PI / points) * i - Math.PI / 2;
                    let px = Math.cos(a) * r, py = Math.sin(a) * r;
                    if (i === 0) tctx.moveTo(px, py); else tctx.lineTo(px, py);
                }
                tctx.closePath();
            }

        const iconCache = {};
        function iconDataURL(type, size) {
            size = size || 28;

            let cx = c.getContext('2d');

        // ==========================================
        // SECTION 5 - LEVEL GENERATION & ENTITY SPAWNING
        // Placement of ground blobs, entities, loot drops.
        // ==========================================
        // A point is safe (not a hazard/hole/sky) exactly when the hex tile it falls in exists
        // and is land. This covers hazard holes and the outer sky in one check, since both are
        // simply "not a land tile" - matching the design that the sky is a hazard too.
        function isSafe(x, y) {
            let h = pixelToAxial(x, y);
            let tile = hexTiles.get(hexKey(h.q, h.r));
            return !!tile && tile.type === 'land';
        }

        // Picks a random continuous point within some land hex, jittered a bit off-center so
        // mobile spawns (enemies, powerups) don't all line up on a lattice. Used for entities
        // that roam rather than sit fixed at a hex's center.
        function getValidSpawn(minRadius, objectRadius) {
            if (!landHexList.length) return { x: 0, y: 0 };
            for (let attempts = 0; attempts < 100; attempts++) {
                let tile = landHexList[Math.floor(Math.random() * landHexList.length)];
                let a = Math.random() * Math.PI * 2;
                let r = Math.random() * HEX_SIZE * 0.4;
                let tx = tile.x + Math.cos(a) * r; let ty = tile.y + Math.sin(a) * r;
                if (dist(0, 0, tx, ty) < minRadius) continue;
                if (dist(tx, ty, goal.x, goal.y) < goal.radius + objectRadius + 30) continue;
                if (goal.active && distToSegment(tx, ty, 0, 0, goal.x, goal.y) < 80) continue;
                if (!isSafe(tx, ty)) continue;
                let valid = true;
                for (let t of trees) { if (dist(tx, ty, t.x, t.y) < objectRadius + t.radius + 15) { valid = false; break; } }
                for (let h of hives) { if (dist(tx, ty, h.x, h.y) < objectRadius + h.radius + 15) { valid = false; break; } }
                if (valid) return { x: tx, y: ty };
            }
            return { x: landHexList[0].x, y: landHexList[0].y };
        }

        // Picks a random unoccupied land hex's exact center - used for the single-element-per-
        // hex placements (chest, hives) so they land cleanly on the honeycomb grid.
        function pickLandHex(minDistFromOrigin) {
            let candidates = landHexList.filter(t => !t.element &&
                dist(t.x, t.y, 0, 0) >= minDistFromOrigin &&
                (!goal.active || dist(t.x, t.y, goal.x, goal.y) > goal.radius + 60));
            if (!candidates.length) candidates = landHexList.filter(t => !t.element);
            if (!candidates.length) return null;
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function spawnSplash(x, y) {
            playSFX('splash');
            splashes.push({ x: x, y: y, vx: 0, vy: 0, life: 1, maxLife: 1, type: 'ripple', color: currentTheme.hazard.edge });
            splashes.push({ x: x, y: y, vx: 0, vy: 0, life: 0.8, maxLife: 1, type: 'ripple', color: currentTheme.hazard.color });
            for(let i=0; i<12; i++) {
                splashes.push({ x: x, y: y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1 + Math.random()*0.5, maxLife: 1.5, type: 'drop', color: currentTheme.hazard.edge });
            }
        }

        function trapezoid(lvl, start, peakStart, peakEnd, end) {
            if (lvl < start) return 0;
            if (lvl < peakStart) return (lvl - start + 1) / (peakStart - start + 1);
            if (lvl <= peakEnd) return 1; if (lvl < end) return 1 - (lvl - peakEnd) / (end - peakEnd);
            return 0;
        }

        function rollItemType(lvl) {
            let cW = lvl <= 1 ? 1 : Math.max(0, 1 - (lvl - 1) / 4);
            let rW = trapezoid(lvl, 2, 5, 7, 10);
            let sW = trapezoid(lvl, 3, 7, 13, 20); 
            let eW = lvl < 4 ? 0 : Math.min(1, (lvl - 3) / 16);
            let total = cW + rW + sW + eW;
            if (total <= 0) return 'emerald';
            let roll = Math.random() * total;
            if (roll < cW) return 'coin'; roll -= cW;
            if (roll < rW) return 'ruby'; roll -= rW;
            if (roll < sW) return 'sapphire'; return 'emerald';
        }

        function coinValue(type) { return type === 'ruby' ? 5 : type === 'sapphire' ? 10 : type === 'emerald' ? 15 : 1; }
        function itemRadiusFor(type) { return type === 'coin' ? 12 : (type === 'emerald' ? 11 : 10); }

        function spawnLoot(x, y, type, vx, vy) { items.push({ x, y, vx: vx || 0, vy: vy || 0, radius: itemRadiusFor(type), type, collected: false, seed: Math.random()*1000, beingEaten: false }); }

        // ---- Roguelite run-item system ----
        // Chests and mimics always drop exactly one of these: 70% common (split evenly across
        // the 3 commons, ~23.3% each), 20% epic, 10% legendary. Items stack with themselves and
        // with each other for the rest of the run.
        function rollRoguelikeItem() {
            let r = Math.random();
            if (r < 0.10) return 'shuriken';
            if (r < 0.30) return 'slimefriend';
            let commons = ['magnet', 'wings', 'spikes'];
            return commons[Math.floor(Math.random() * commons.length)];
        }

        // Adds companion slimes up to the current Slime Squad stack count, without touching
        // ones that already exist (so mid-level kills of companions aren't undone until the
        // next level, but a fresh pickup mid-level still spawns its extra slime immediately).
        function syncCompanionsToStack() {
            let target = runItems.slimefriend || 0;
            while (companions.length < target) {
                let skin = basicSkins[Math.floor(Math.random() * basicSkins.length)];
                companions.push({ x: player.worldX, y: player.worldY, radius: 16, colorId: skin.id });
            }
        }

        function grantRoguelikeItem(id) {
            runItems[id] = (runItems[id] || 0) + 1;
            if (id === 'slimefriend') syncCompanionsToStack();
            updateItemsHUD();
            showItemToast(id);
        }

        // Renders the icon-only badges (with a small count number for stacks > 1) into the
        // top-left HUD box, underneath the Level display.
        function updateItemsHUD() {
            let container = domRefs.itemsHud;
            if (!container) return;
            container.innerHTML = '';
            const order = ['magnet', 'wings', 'spikes', 'slimefriend', 'shuriken'];
            order.forEach(id => {
                let count = runItems[id];
                if (!count) return;
                let def = roguelikeItemDefs[id];
                let div = document.createElement('div');
                div.className = 'item-badge rarity-' + def.rarity;
                let img = document.createElement('img'); img.src = iconDataURL(id, 28); img.alt = def.name;
                div.appendChild(img);
                if (count > 1) {
                    let badge = document.createElement('span'); badge.className = 'item-count'; badge.innerText = count;
                    div.appendChild(badge);
                }
                container.appendChild(div);
            });
        }

        // Restarts the toast's pop-in animation without forcing a synchronous layout. The old
        // `void el.offsetWidth` trick works, but it forces the browser to compute layout
        // synchronously right in the middle of this function call - a real (if small) stall
        // that happens on every pickup. A double rAF gets the same "class was truly removed
        // before being re-added" guarantee, but lets the browser fold that layout work into its
        // normal paint scheduling instead of blocking script execution for it.
        function showItemToast(id) {
            let def = roguelikeItemDefs[id];
            let el = document.getElementById('item-toast');
            let iconEl = document.getElementById('item-toast-icon');
            let textEl = document.getElementById('item-toast-text');
            if (!el || !iconEl || !textEl) return;
            iconEl.src = iconDataURL(id, 28);
            textEl.innerText = def.name + ' +1';
            el.classList.remove('pop-anim');
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('pop-anim')));
        }

        function destroyEnemyByIndex(idx, coinRange) {
            let e = enemies[idx]; if (!e) return;
            let range = coinRange || [2,4]; let n = Math.floor(range[0] + Math.random() * (range[1]-range[0]+1));
            if (e.type === 'wanderer' && e.heldCoin) spawnLoot(e.x, e.y, e.heldCoin, (Math.random()-0.5)*18, (Math.random()-0.5)*18);
            for (let i = 0; i < n; i++) spawnLoot(e.x, e.y, rollItemType(level), (Math.random()-0.5)*18, (Math.random()-0.5)*18);
            if (coinRange[1] > 0) playSFX('enemy_hit');

        }

        // Builds every land hex that has at least one neighbor which is a hole or is missing
        // entirely (i.e. borders the sky). Populates each qualifying tile's fenceCandidateDirs
        // and returns the flat list, also used elsewhere (ambient rim splashes).
        function findBorderHexes() {
            let border = [];
            for (let tile of landHexList) {
                let dirs = [];
                for (let i = 0; i < 6; i++) {
                    let d = HEX_DIRS[i];
                    let nb = hexTiles.get(hexKey(tile.q + d.q, tile.r + d.r));
                    if (!nb || nb.type === 'hole') dirs.push(i);
                }
                if (dirs.length) { tile.fenceCandidateDirs = dirs; border.push(tile); }
                else tile.fenceCandidateDirs = null;
            }
            return border;
        }

        // Fences have a base chance to appear along any land-hex edge that faces a hazard hole
        // or the sky, then a couple of relaxation passes raise the odds for hexes sitting next
        // to an already-fenced border hex, so fences tend to link up into continuous runs
        // instead of scattering randomly. Fences never occupy a hex's single-element slot.
        function buildFences() {
            fences = [];
            borderHexList = findBorderHexes();
            const baseChance = 0.09, linkChance = 0.32, relaxPasses = 2;
            for (let tile of borderHexList) tile.hasFence = Math.random() < baseChance;
            for (let pass = 0; pass < relaxPasses; pass++) {
                for (let tile of borderHexList) {
                    if (tile.hasFence) continue;
                    let neighborHasFence = false;
                    for (let d of HEX_DIRS) {
                        let nb = hexTiles.get(hexKey(tile.q + d.q, tile.r + d.r));
                        if (nb && nb.fenceCandidateDirs && nb.hasFence) { neighborHasFence = true; break; }
                    }
                    if (neighborHasFence && Math.random() < linkChance) tile.hasFence = true;
                }

                }
            }
        }

        function generateLevel() {

            flameParticles = []; leaves = []; splashes = []; powerups = []; chest = null;
            hexTiles = new Map(); landHexList = []; holeHexList = []; borderHexList = []; fences = [];
            player.activePowerup = null; player.powerupDuration = 0; player.powerupTimeLeft = 0; player.hazardTimer = 0; player.spikesTimer = 0;
            safeGridCache.clear();

            musicSped = false;
            if (domRefs.timeCountdown) domRefs.timeCountdown.style.display = 'none';
            updateHazardVignette(0);


            // Roguelite: every level, re-spawn the player's earned companion slimes fresh, and
            // reset the trail buffer they follow so they don't rush in from a previous level.
            companions = [];
            playerTrail = [];
            syncCompanionsToStack();
            
            let scaledLevel = Math.min(20, level);
            MAX_TIME = Math.max(20, 45 - (scaledLevel - 1) * (25 / 19));
            timeLeft = MAX_TIME;
            goal.required = Math.round(Math.min(50, 5 + (scaledLevel - 1) * 2.3)); goal.collected = 0;
            
            currentTheme = themes[(level - 1) % themes.length];
            // Restart the background music for the new level (matches the old sequencer's

            playMusicTrack((level - 1) % musicFiles.length);
            
            document.body.style.setProperty('--bg-color', currentTheme.bg);

            // ---- Footprint: reuse the old organic blob-chain shape to decide overall map size
            // and layout (so total area/level-scaling/goal placement stays the same as before),
            // then discretize it onto the hex grid instead of rendering the circles directly. ----
            let shapeBlobs = [{ x: 0, y: 0, r: 400 + Math.random() * 100 }];
            let blobCount = 4 + Math.floor(scaledLevel * 0.25);
            for (let i = 0; i < blobCount; i++) {
                let baseNode = shapeBlobs[Math.floor(Math.random() * shapeBlobs.length)];
                let angle = Math.random() * Math.PI * 2;
                let isDisconnected = Math.random() < 0.25;
                let distance = isDisconnected ? baseNode.r + 250 + Math.random() * 150 : baseNode.r + 50 + Math.random() * 200;
                let radius = 250 + Math.random() * 250;
                shapeBlobs.push({ x: baseNode.x + Math.cos(angle)*distance, y: baseNode.y + Math.sin(angle)*distance, r: radius });
            }
            let endNode = shapeBlobs[shapeBlobs.length - 1];
            function inFootprint(x, y) { for (let b of shapeBlobs) { if (dist(x, y, b.x, b.y) <= b.r) return true; } return false; }

                    let p = axialToPixel(q, r);
                    if (inFootprint(p.x, p.y)) hexTiles.set(hexKey(q, r), { q, r, x: p.x, y: p.y, type: 'land', element: null, hasFence: false, fenceCandidateDirs: null });
                }
            }

            // Pin down the goal's hex before hole-carving so it's never eaten by a hole.
            let goalHexCoord = pixelToAxial(endNode.x, endNode.y);
            let goalKey = hexKey(goalHexCoord.q, goalHexCoord.r);
            let goalTile = hexTiles.get(goalKey);
            if (!goalTile) { let p = axialToPixel(goalHexCoord.q, goalHexCoord.r); goalTile = { q: goalHexCoord.q, r: goalHexCoord.r, x: p.x, y: p.y, type: 'land', element: null, hasFence: false, fenceCandidateDirs: null }; hexTiles.set(goalKey, goalTile); }

            // goal. Holes grow from a seed into a small cluster (rather than each tile rolling
            // independently) so a hazard patch is almost never a single isolated hexagon. ----
            function isInterior(tile) { return HEX_DIRS.every(d => hexTiles.has(hexKey(tile.q + d.q, tile.r + d.r))); }
            const holeSeedChance = 0.03, holeGrowChance = 0.55, minClusterSize = 2, maxClusterSize = 6;
            let carved = new Set();
            for (let tile of hexTiles.values()) {
                if (tile === goalTile || carved.has(tile)) continue;
                if (dist(tile.x, tile.y, 0, 0) < 220) continue;
                if (!isInterior(tile)) continue;
                if (Math.random() >= holeSeedChance) continue;
                let targetSize = minClusterSize + Math.floor(Math.random() * (maxClusterSize - minClusterSize + 1));
                let cluster = [tile];

                while (cluster.length < targetSize && frontier.length) {

                    let dirsShuffled = HEX_DIRS.slice().sort(() => Math.random() - 0.5);
                    for (let d of dirsShuffled) {
                        if (cluster.length >= targetSize) break;
                        let nb = hexTiles.get(hexKey(cur.q + d.q, cur.r + d.r));
                        if (!nb || nb === goalTile || carved.has(nb) || nb.type === 'hole') continue;

                    }

            }

            buildLandTileGrid();

            buildFenceGrid();

            let chestTile = pickLandHex(300) || (landHexList.length ? landHexList[0] : null);
            if (chestTile) { chest = { x: chestTile.x, y: chestTile.y, radius: 25, collected: false }; chestTile.element = { type: 'chest' }; }

                } else if (roll < treeRockChance + coinChance) {

            for(let i=0; i < totalEnemies; i++) {

                if (eType === 'mimic') { if (mimicSpawned) eType = availableEnemies[0]; else mimicSpawned = true; }

                let ePos = getValidSpawn(250, 18);
                let e = { x: ePos.x, y: ePos.y, radius: 18, speed: baseSpeed + (Math.random() * 0.5), type: eType, angle: Math.random() * Math.PI * 2, stateTimer: 0, state: 'idle', blinkSeed: Math.random()*1000 };

                    e.x = hive.x + (Math.random()-0.5)*50; e.y = hive.y + (Math.random()-0.5)*50; e.homeX = hive.x; e.homeY = hive.y;

                }

            }

            for (let tile of landHexList) {
                let density = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < density; i++) {

        let gachaSlimes = [];

        let gachaAnimId = null;

        let crane = { state: 'idle', x: 150, y: 20, prevX: 150, prevY: 20, speed: 5, targetSlime: null, restY: 20 };

        function handleDeviceTilt(e) {

        document.getElementById('hud-coin-icon').src = iconDataURL('coin', 22);

        function buildShopUI() {

                    <div class="shop-coin-bag">

            document.getElementById('tab-hats').addEventListener('click', () => switchShopTab('hats'));
            document.getElementById('btn-pull').addEventListener('click', pullGacha);
            // Removing a hat also counts toward the hidden perf-overlay toggle: 20 CONSECUTIVE

        // Counter for the hidden perf-overlay toggle (20 consecutive Remove Hat clicks).

        document.addEventListener('click', (e) => {

                removeHatClickCount = 0;

        let gachaListenersAttached = false;
        function getGachaCanvasMousePos(e) {

        function handleGachaMove(e) {
            if (!draggedGachaSlime || crane.state !== 'idle') return;

            draggedGachaSlime.vy = (pos.y - draggedGachaSlime.y) * 0.4;

            draggedGachaSlime.y = Math.max(draggedGachaSlime.radius, Math.min(240 - draggedGachaSlime.radius, pos.y));
        }
        function handleGachaUp() { draggedGachaSlime = null; }

        function setupGachaPhysics() {
            gachaCanvas = document.getElementById('gacha-canvas');
            if (!gachaCanvas) return;
            gachaCtx = gachaCanvas.getContext('2d');
            
            gachaSlimes = [];
            crane.state = 'idle';
            crane.x = 150;
            crane.y = crane.restY;
            crane.prevX = crane.x; crane.prevY = crane.y;
            crane.targetSlime = null;

            // Reset the gacha loop's clock/accumulator so re-opening the shop (or dismissing a
            // reveal) never sees a huge elapsed-time gap from being closed/idle - that would
            // otherwise be read as a large backlog and cause a burst of catch-up steps.
            loopGachaPhysics.lastTime = performance.now();
            gachaAccumulator = 0;

            const GACHA_POOL_SIZE = 28;
            const RARE_CHANCE = 0.05;
            const HAT_CHANCE = 0.20;
            for (let i = 0; i < GACHA_POOL_SIZE; i++) {
                let roll = Math.random();
                let category, itemData, radius;
                if (roll < RARE_CHANCE) {
                    category = 'rare';
                    itemData = rareSkins[Math.floor(Math.random() * rareSkins.length)]; radius = 16;
                } else if (roll < RARE_CHANCE + HAT_CHANCE) {
                    category = 'hat';
                    itemData = hats[Math.floor(Math.random() * hats.length)]; radius = 14;
                } else {
                    category = 'basic';
                    itemData = basicSkins[Math.floor(Math.random() * basicSkins.length)]; radius = 16;
                }
                gachaSlimes.push({
                    x: 40 + Math.random() * 220,
                    y: 100 + Math.random() * 100,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    radius: radius,
                    color: itemData.color || '#3498db',
                    isAnimated: itemData.isAnimated,

                    category: category,

                    }

            };
