        }

        // One fixed-size physics step: gravity, friction, self-hop chance, position integration,
        // pairwise collision response, and crane state advance. All constants here are unchanged
        // from the original per-call values - they are only ever invoked a fixed number of times
        // per real second by loopGachaPhysics() below, never scaled, so behavior is identical no
        // matter how often (or unevenly) the browser actually calls the rAF loop.
        function stepGachaSlimes() {
            // Snapshot "before this step" positions for every slime and the crane, in a separate
            // pass before any movement runs. This has to be a full pass first (not folded into
            // the loop below) because that loop's pairwise collision response can also move a
            // later-indexed slime before its own turn comes up - snapshotting inline would catch
            // some slimes' positions only after they'd already been shoved by an earlier slime.
            for (let i = 0; i < gachaSlimes.length; i++) {
                let s = gachaSlimes[i];
                s.prevX = s.x; s.prevY = s.y;
            }
            crane.prevX = crane.x; crane.prevY = crane.y;

            for (let i = 0; i < gachaSlimes.length; i++) {
                let s = gachaSlimes[i];
                if (s !== draggedGachaSlime && (!crane.targetSlime || s !== crane.targetSlime || crane.state !== 'ascending')) {
                    s.vx += gachaGravityX;
                    s.vy += gachaGravityY;
                    s.vx *= 0.98;
                    s.vy *= 0.98;
                    // Small chance each step for a living slime to hop/scoot on its own; with ~28
                    // slimes in the pool this keeps activity commonplace without every slime moving
                    // at once. Hat bubbles are accessories, not living slimes, so they never self-hop -
                    // they only move when knocked around by a slime or dragged by the player.
                    if (s.category !== 'hat' && Math.random() < 0.0015) {
                        s.vx += (Math.random() - 0.5) * 7;
                        s.vy -= 5 + Math.random() * 4;
                    }
                    s.x += s.vx;
                    s.y += s.vy;

                    if (s.x < s.radius) { s.x = s.radius; s.vx *= -0.4; }
                    if (s.x > 300 - s.radius) { s.x = 300 - s.radius; s.vx *= -0.4; }
                    if (s.y > 240 - s.radius) { s.y = 240 - s.radius; s.vy *= -0.3; s.vx *= 0.9; }
                    if (s.y < s.radius) { s.y = s.radius; s.vy *= -0.4; }
                }

                for (let j = i + 1; j < gachaSlimes.length; j++) {
                    let s2 = gachaSlimes[j];
                    let dx = s2.x - s.x; let dy = s2.y - s.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = s.radius + s2.radius;
                    if (dist < minDist) {
                        let overlap = minDist - dist;
                        let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                        // Push impulse scales with how fast the two are approaching each other, so a
                        // slime landing from a big hop (or being dragged fast) shoves its neighbors
                        // aside with real force instead of barely nudging them.
                        let closingSpeed = Math.max(0, -( (s2.vx - s.vx) * nx + (s2.vy - s.vy) * ny ));
                        let impulse = overlap * 0.4 + closingSpeed * 0.5;
                        if (s !== draggedGachaSlime) { s.x -= nx * overlap * 0.5; s.y -= ny * overlap * 0.5; s.vx -= nx * impulse; s.vy -= ny * impulse; }
                        if (s2 !== draggedGachaSlime) { s2.x += nx * overlap * 0.5; s2.y += ny * overlap * 0.5; s2.vx += nx * impulse; s2.vy += ny * impulse; }
                    }
                }
            }

            if (crane.state === 'descending') {
                crane.y += crane.speed;
                let targetY = crane.targetSlime.y - crane.targetSlime.radius;
                if (crane.y >= targetY) {
                    crane.state = 'ascending';
                    playSFX('click');
                }
            } else if (crane.state === 'ascending') {
                crane.y -= crane.speed;
                crane.targetSlime.x = crane.x;
                crane.targetSlime.y = crane.y + crane.targetSlime.radius;
                if (crane.y <= crane.restY) {
                    crane.state = 'idle';
                    let won = crane.targetSlime;
                    gachaSlimes = gachaSlimes.filter(s => s !== won);
                    crane.targetSlime = null;
                    crane.x = 150; crane.y = crane.restY;
                    revealGachaReward(won.skinData, won.category);
                }
            }
        }

        function loopGachaPhysics() {
            if (!gachaCtx) return;

            // Fixed-timestep catch-up, mirroring the main game loop's architecture (SECTION 9).
            // stepGachaSlimes() runs a consistent number of times per real second regardless of
            // how often this rAF callback actually fires, keeping both slime motion and crane
            // speed correct under any render frame rate - including throttled conditions like
            // Low Power Mode - while every individual step still uses the exact same untouched
            // constants that were stable to begin with.
            let now = performance.now();
            let dt = now - (loopGachaPhysics.lastTime || now);
            loopGachaPhysics.lastTime = now;
            gachaAccumulator += dt;
            if (gachaAccumulator > 250) gachaAccumulator = 250; // avoid a huge catch-up burst after a long stall

            let steps = 0;
            while (gachaAccumulator >= gachaTimeStep && steps < gachaMaxCatchUpSteps) {
                stepGachaSlimes();
                gachaAccumulator -= gachaTimeStep;
                steps++;
            }

            // Fraction of a step left over after the catch-up loop above. Used to blend each
            // slime/crane's rendered position between its prev-step and current-step location so
            // motion stays visually continuous even when this rAF callback fires irregularly.
            let gAlpha = Math.min(1, gachaAccumulator / gachaTimeStep);

            gachaCtx.clearRect(0, 0, 300, 240);

            for (let i = 0; i < gachaSlimes.length; i++) {
                let s = gachaSlimes[i];
                // The slime currently being dragged renders at its live position (not
                // interpolated) so it tracks the pointer/finger with zero added lag.
                let sx = s.x, sy = s.y;
                if (s !== draggedGachaSlime && s.prevX !== undefined) {
                    sx = s.prevX + (s.x - s.prevX) * gAlpha;
                    sy = s.prevY + (s.y - s.prevY) * gAlpha;
                }
                if (s.category === 'hat') {
                    gachaCtx.save();
                    gachaCtx.translate(sx, sy);
                    if (!gachaHatBubbleGradCache || gachaHatBubbleGradRadius !== s.radius) {
                        let bg = gachaCtx.createRadialGradient(-s.radius * 0.3, -s.radius * 0.3, 1, 0, 0, s.radius);
                        bg.addColorStop(0, 'rgba(255,255,255,0.9)');
                        bg.addColorStop(0.4, 'rgba(200,230,255,0.5)');
                        bg.addColorStop(1, 'rgba(120,180,255,0.35)');
                        gachaHatBubbleGradCache = bg;
                        gachaHatBubbleGradRadius = s.radius;
                    }
                    gachaCtx.fillStyle = gachaHatBubbleGradCache;
                    gachaCtx.beginPath(); gachaCtx.arc(0, 0, s.radius, 0, Math.PI * 2); gachaCtx.fill();
                    gachaCtx.strokeStyle = 'rgba(255,255,255,0.85)'; gachaCtx.lineWidth = 1.5;
                    gachaCtx.beginPath(); gachaCtx.arc(0, 0, s.radius, 0, Math.PI * 2); gachaCtx.stroke();
                    gachaCtx.globalAlpha = 0.85; gachaCtx.fillStyle = '#fff';
                    gachaCtx.beginPath();

                    gachaCtx.restore();
                } else {
                    drawCharacterModel(sx, sy, s.vx, s.vy, s.radius, s.skinData.id, false, null, gachaCtx);
                }
            }

            // Interpolated crane rig position for this render frame (see gAlpha above).
            let craneX = crane.prevX !== undefined ? crane.prevX + (crane.x - crane.prevX) * gAlpha : crane.x;
            let craneY = crane.prevY !== undefined ? crane.prevY + (crane.y - crane.prevY) * gAlpha : crane.y;

            gachaCtx.save();
            gachaCtx.fillStyle = '#232b33';
            gachaCtx.fillRect(craneX - 22, 0, 44, 9);
            gachaCtx.fillStyle = '#4a5661'; gachaCtx.fillRect(craneX - 22, 0, 44, 3);
            gachaCtx.fillStyle = '#12171c';
            gachaCtx.fillRect(craneX - 22, 7, 44, 2);
            let cableGrad = gachaCtx.createLinearGradient(craneX - 2, 0, craneX + 2, 0);
            cableGrad.addColorStop(0, '#5d6d7e'); cableGrad.addColorStop(0.5, '#d5dbe0'); cableGrad.addColorStop(1, '#5d6d7e');
            gachaCtx.strokeStyle = cableGrad; gachaCtx.lineWidth = 3; gachaCtx.lineCap = 'round';
            gachaCtx.beginPath(); gachaCtx.moveTo(craneX, 9);
            gachaCtx.lineTo(craneX, craneY - 6); gachaCtx.stroke();
            let housingGrad = gachaCtx.createLinearGradient(craneX - 10, craneY - 6, craneX + 10, craneY + 6);
            housingGrad.addColorStop(0, '#95a5a6'); housingGrad.addColorStop(1, '#5f6a6a');
            gachaCtx.fillStyle = housingGrad;
            gachaCtx.beginPath(); gachaCtx.roundRect(craneX - 10, craneY - 6, 20, 13, 3); gachaCtx.fill();
            gachaCtx.strokeStyle = '#333'; gachaCtx.lineWidth = 1; gachaCtx.stroke();
            gachaCtx.fillStyle = '#2c3540'; gachaCtx.beginPath(); gachaCtx.arc(craneX - 6, craneY, 1.5, 0, Math.PI*2);
            gachaCtx.arc(craneX + 6, craneY, 1.5, 0, Math.PI*2); gachaCtx.fill();
            let clawShut = crane.state === 'ascending';
            let spread = clawShut ? 5 : 15;
            let dip = clawShut ? 16 : 12;
            gachaCtx.strokeStyle = '#b6bfc2';
            gachaCtx.lineWidth = 4.5; gachaCtx.lineCap = 'round'; gachaCtx.lineJoin = 'round';
            gachaCtx.beginPath();
            gachaCtx.moveTo(craneX - spread, craneY + dip);
            gachaCtx.quadraticCurveTo(craneX - 5, craneY + 5, craneX, craneY + 4);
            gachaCtx.quadraticCurveTo(craneX + 5, craneY + 5, craneX + spread, craneY + dip);
            gachaCtx.stroke();
            gachaCtx.strokeStyle = '#7f8c8d'; gachaCtx.lineWidth = 2.5;
            gachaCtx.beginPath();
            gachaCtx.moveTo(craneX - spread*0.55, craneY + dip*0.6); gachaCtx.lineTo(craneX - spread, craneY + dip);
            gachaCtx.moveTo(craneX + spread*0.55, craneY + dip*0.6);
            gachaCtx.lineTo(craneX + spread, craneY + dip);
            gachaCtx.stroke();
            gachaCtx.fillStyle = '#dfe4e6';
            gachaCtx.beginPath(); gachaCtx.arc(craneX - spread, craneY + dip, 2, 0, Math.PI*2); gachaCtx.arc(craneX + spread, craneY + dip, 2, 0, Math.PI*2); gachaCtx.fill();
            gachaCtx.restore();

            gachaAnimId = requestAnimationFrame(loopGachaPhysics);
        }

        function updateHazardVignette(ratio) {

        function updateTimeDangerEffects() {

        function handleStart(e) {
            initAudio();
            let unlockPopup = document.getElementById('unlock-popup');
            if (unlockPopup.classList.contains('pop-anim')) { unlockPopup.classList.remove('pop-anim'); return; }
            if (gameState !== 'playing') return;
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e; lastX = touch.clientX; lastY = touch.clientY;
            pointerScreenX = touch.clientX;
            pointerScreenY = touch.clientY;
        }
        function handleMove(e) {
            if (!isDragging || gameState !== 'playing') return;
            const touch = e.touches ? e.touches[0] : e;
            let dx = touch.clientX - lastX; let dy = touch.clientY - lastY;
            let dir = userSettings.invert ? -1 : 1;
            player.vx += dx * sensitivity * dir;
            player.vy += dy * sensitivity * dir;
            player.jiggleForceX = dx * sensitivity * dir;
            player.jiggleForceY = dy * sensitivity * dir;
            lastX = touch.clientX; lastY = touch.clientY; pointerScreenX = touch.clientX; pointerScreenY = touch.clientY;
        }
        function handleEnd() { isDragging = false;
        }
        window.addEventListener('mousedown', handleStart); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false}); window.addEventListener('touchend', handleEnd);

        // Prevent double-tap-to-zoom (mobile browsers can trigger this on rapid taps over text/UI),
        // but never intercept taps on buttons or clickable controls so fast tapping still works.
        let lastTapTime = 0;
        document.addEventListener('touchend', function(e) {
            const interactive = e.target.closest('button, .inv-item, .shop-tab, .toggle-btn, [onclick]');
            if (interactive) { lastTapTime = 0; return; }
            const now = Date.now();
            if (now - lastTapTime <= 350) {
                e.preventDefault();
            }
            lastTapTime = now;
        }, { passive: false, capture: true });

        // SECTION 7 - GAME LOGIC & PHYSICS
        // Central update loop, physics calculations, AI, and collision.
        // ==========================================
        function getLightningTargetWorld() { return { x: pointerScreenX + camera.x, y: pointerScreenY + camera.y }; }

        function applyPowerupEffect() {
            let pu = powerupTypesById.get(player.activePowerup); if (!pu) return;
            if (pu.id === 'lightning') playSFX('lightning');

            if (pu.mode === 'contact') {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (dist(player.worldX, player.worldY, enemies[i].x, enemies[i].y) < player.radius + enemies[i].radius) { destroyEnemyByIndex(i, pu.coinDrop); }
                } return;
            }

            if (pu.mode === 'cone') {
                let facing = (Math.abs(player.vx) + Math.abs(player.vy) > 0.3) ? Math.atan2(player.vy, player.vx) : player.facing;
                if (Math.random() < 0.9) {
                    let a = facing + (Math.random() - 0.5) * (Math.PI / 3); let spd = 5 + Math.random() * 3;
                    flameParticles.push({ x: player.worldX + Math.cos(facing)*player.radius*0.6, y: player.worldY + Math.sin(facing)*player.radius*0.6, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 2, maxLife: 2, size: 8 + Math.random()*8 });
                }
                if (Math.random() < 0.1) playSFX('fire');
            }

            player.powerupTickTimer += 1/60; if (player.powerupTickTimer < pu.tick) return;
            player.powerupTickTimer = 0;

            if (pu.mode === 'cone') {
                let facing = (Math.abs(player.vx) + Math.abs(player.vy) > 0.3) ? Math.atan2(player.vy, player.vx) : player.facing;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (dist(player.worldX, player.worldY, e.x, e.y) < pu.radius && Math.abs(normalizeAngle(Math.atan2(e.y - player.worldY, e.x - player.worldX) - facing)) <= Math.PI / 2.1) destroyEnemyByIndex(i, pu.coinDrop);
                }
            } else if (pu.mode === 'beam') {
                let target = getLightningTargetWorld();
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (distToSegment(enemies[i].x, enemies[i].y, player.worldX, player.worldY, target.x, target.y) < pu.radius + enemies[i].radius) destroyEnemyByIndex(i, pu.coinDrop);
                }
            } else if (pu.mode === 'nova') {
                playSFX('ice_nova');
                for (let i = 0; i < 10; i++) {
                    let a = (i / 10) * Math.PI * 2;
                    icicles.push({ x: player.worldX, y: player.worldY, vx: Math.cos(a)*9, vy: Math.sin(a)*9, angle: a, traveled: 0, maxRange: 420, radius: 7 });
                } screenShake = Math.max(screenShake, 8);
            }
        }

        function update() {
            // Snapshot this-tick's "before" positions for everything draw() interpolates (see
            // SECTION 8/9). This runs exactly once per fixed physics step (update() is only ever
            // called from inside the accumulator's while-loop), so prevX/prevY always holds the
            // position from exactly one timeStep ago by the time draw() blends against it with
            // renderAlpha - keeping motion smooth even when an irregular number of steps land
            // between rendered frames (e.g. under throttled rAF / Low Power Mode).
            player.prevWorldX = player.worldX; player.prevWorldY = player.worldY;
            camera.prevX = camera.x; camera.prevY = camera.y;
            for (let i = 0; i < enemies.length; i++) { enemies[i].prevX = enemies[i].x; enemies[i].prevY = enemies[i].y; }
            for (let i = 0; i < companions.length; i++) { companions[i].prevX = companions[i].x; companions[i].prevY = companions[i].y; }

            manageBeeBuzzing();

                            let dx = player.worldX - c.x, dy = player.worldY - c.y;
                            let d = Math.hypot(dx, dy);

                        if (!c.collected && !c.beingEaten && dist(player.worldX, player.worldY, c.x, c.y) < player.radius + c.radius) {

                    for (let i = enemies.length - 1; i >= 0; i--) {

                            }
                        } else {

                        }

                        if (e.type !== 'hopper' || e.state === 'idle') {
                            let nearTrees = getNearbyTrees(e.x, e.y);

                                    let overlap = threshold - d; let pushAngle = Math.atan2(dy, dx);
                                    e.x += Math.cos(pushAngle) * overlap; e.y += Math.sin(pushAngle) * overlap;
                                    if (e.type === 'wanderer' || e.type === 'dasher') e.angle += (Math.random() * 0.5) + 0.5;
                                }

                            let fencePushed = resolveFenceCollision(e.x, e.y, e.radius);
                            if (fencePushed.x !== e.x || fencePushed.y !== e.y) {
                                if (e.type === 'wanderer' || e.type === 'dasher') e.angle += (Math.random() * 0.5) + 0.5;

                            if (pth > 0 && pdx*pdx + pdy*pdy < pth*pth) {

                                if (!slimesFriendly && player.activePowerup !== 'rampage') {
            triggerGameOver(e.type);
                                }

                        }

                    // Roguelite: companion slimes mutually destroy any enemy they touch.
                    for (let ci = companions.length - 1; ci >= 0; ci--) {

                        }

                    let nearTreesPlayer = getNearbyTrees(player.worldX, player.worldY);

                        let collisionDist = player.radius * 0.4 + t.radius * 0.5;
                        let distSq = dx*dx + dy*dy;
                        if (distSq < collisionDist*collisionDist) {
                            let d = Math.sqrt(distSq);
                            let overlap = collisionDist - d; let angle = Math.atan2(dy, dx);
                            player.worldX += Math.cos(angle) * overlap; player.worldY += Math.sin(angle) * overlap; player.vx *= 0.6; player.vy *= 0.6;
                        }
                    }

                        if (pushed.x !== player.worldX || pushed.y !== player.worldY) {

                    }
                    for (let hi = 0; hi < hives.length; hi++) {

                            let d = Math.sqrt(distSq);
                            let overlap = collisionDist - d; let angle = Math.atan2(dy, dx);
                            player.worldX += Math.cos(angle) * overlap; player.worldY += Math.sin(angle) * overlap; player.vx *= 0.6; player.vy *= 0.6;
                        }
                    }
                    if (goal.active && goal.collected >= goal.required && dist(player.worldX, player.worldY, goal.x, goal.y) < player.radius + goal.radius - 10) {
                        gameState = 'level_end';
                        if (level > highestLevel) { highestLevel = level; storage.set('landSlidersBestLevel', highestLevel); }

            for (let i = projectiles.length - 1; i >= 0; i--) {

                for (let ti = 0; ti < nearTreesProj.length; ti++) {
                    let t = nearTreesProj[ti];
                    let dx = p.x - t.x, dy = p.y - t.y;

                    if (dx*dx + dy*dy < th*th) { hitObstacle = true; break; }
                }
                if (!hitObstacle) {
                    let nearFencesProj = getNearbyFences(p.x, p.y);
                    for (let fi = 0; fi < nearFencesProj.length; fi++) {

                        let dx = f.x2 - f.x1, dy = f.y2 - f.y1;
                        let lenSq = dx*dx + dy*dy;
                        let t = lenSq > 0 ? ((p.x - f.x1) * dx + (p.y - f.y1) * dy) / lenSq : 0;
                        t = Math.max(0, Math.min(1, t));
                        let cx = f.x1 + t * dx, cy = f.y1 + t * dy;
                        let ex = p.x - cx, ey = p.y - cy;
                        let th = p.radius + fenceThickness;
                        if (ex*ex + ey*ey < th*th) { hitObstacle = true; break; }
                    }
                }
                if (hitObstacle) { projectiles.splice(i, 1); continue; }
                
                if (gameState === 'playing' && dist(player.worldX, player.worldY, p.x, p.y) < player.radius + p.radius) {

            for (let i = leaves.length - 1; i >= 0; i--) { let l = leaves[i];

                l.x += l.vx; l.y += l.vy; l.vx *= 0.95; l.vy *= 0.95; l.life -= 1/60;

            for (let i = splashes.length - 1; i >= 0; i--) { let s = splashes[i];
                if (!isNearScreen(s.x, s.y)) { splashes.splice(i, 1); continue; }
                s.x += s.vx; s.y += s.vy; s.vx *= 0.9; s.vy *= 0.9; s.life -= 1/30;

            }
        }

        // The outer part of the map (everything past the honeycomb's edge) is open sky with
        // slow-drifting clouds, a fixed sun glow, a dim parallax cloud layer behind the main
        // clouds, and sparse drifting birds for a bit more atmosphere than a flat gradient. It
        // still counts as a hazard for gameplay purposes (isSafe treats it the same as a hole),
        // it just isn't lava/water flavored out there.
        function drawSkyBackground() {
            // PERF: both gradients below used to be rebuilt from scratch every single frame,
            // unconditionally, with camera.x/y baked directly into their coordinates. A
            // CanvasGradient's control points are evaluated against whatever transform is
            // active when it's painted (not the transform at creation time), so baking the
            // camera position in meant a fresh gradient object was required every single frame
            // just to stay aligned as the camera moved - guaranteed cost on every frame,
            // regardless of gameplay. Translating to the camera's position first and building
            // both gradients in local (0,0)-relative space instead makes them genuinely
            // constant (same colors, same fixed sun position/radius every time), so they can be
            // created once and reused forever; only a canvas resize invalidates them.
            ctx.save();
            ctx.translate(camera.x, camera.y);
            if (!skyGradientCache || skyGradientCacheH !== canvas.height) {
                skyGradientCache = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGradientCache.addColorStop(0, '#6ec2ff'); skyGradientCache.addColorStop(0.55, '#8fd3ff'); skyGradientCache.addColorStop(1, '#d3f0ff');
                skyGradientCacheH = canvas.height;
            }
            ctx.fillStyle = skyGradientCache;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Soft sun glow, fixed in world space so it drifts past naturally as the camera moves
            // rather than following the player around.
            ctx.save();
            let sunX = 500, sunY = -600;
            if (!sunGradientCache) {
                sunGradientCache = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 750);
                sunGradientCache.addColorStop(0, 'rgba(255,255,230,0.5)');
                sunGradientCache.addColorStop(1, 'rgba(255,255,230,0)');
            }
            ctx.fillStyle = sunGradientCache;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            ctx.restore();

            const driftSpeed = 8;
            let drift = (Date.now() / 1000) * driftSpeed;

            // Dim, slower-drifting back layer for parallax depth.
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            drawCloudLayer(600, 340, drift * 0.4, 18, 16, 9.13);
            ctx.restore();

            // Sparse distant birds, far enough apart that they read as ambient detail.
            ctx.save();
            ctx.strokeStyle = 'rgba(50,55,65,0.55)';
            ctx.lineWidth = 2;
            drawBirdLayer(drift);
            ctx.restore();

            // Main puffy cloud layer, closest and brightest.
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            drawCloudLayer(420, 260, drift, 30, 26, 0);
            ctx.restore();
        }
        // Shared by both cloud layers (drawSkyBackground). Cloud identity (seed) comes from a
        // stable integer tile index (i,j), never from the continuously-changing drifted position
        // - only the final draw position depends on drift. Otherwise each cloud's "identity" kept
        // shifting every frame, which read as clouds glitching/morphing instead of drifting
        // smoothly. `seedOffset` gives each layer its own independent pattern.
        function drawCloudLayer(spacingX, spacingY, drift, sizeBase, sizeVar, seedOffset) {
            let iStart = Math.floor((camera.x - drift) / spacingX) - 1;
            let iEnd = Math.ceil((camera.x + canvas.width - drift) / spacingX) + 1;
            let jStart = Math.floor(camera.y / spacingY) - 1;
            let jEnd = Math.ceil((camera.y + canvas.height) / spacingY) + 1;
            for (let i = iStart; i <= iEnd; i++) {
                for (let j = jStart; j <= jEnd; j++) {
                    let seed = Math.abs(Math.sin(i * 12.9898 + j * 78.233 + seedOffset) * 43758.5453);
                    seed -= Math.floor(seed);
                    let cx = i * spacingX + seed * 140 + drift;
                    let cy = j * spacingY + ((seed * 71) % 1) * 120;
                    drawCloudPuff(cx, cy, sizeBase + seed * sizeVar);
                }
            }
        }
        // Sparse drifting V-shaped birds, gently bobbing, well-spaced so most grid cells are
        // skipped and only a handful are ever on screen at once.
        function drawBirdLayer(drift) {
            const spacingX = 900, spacingY = 700;
            let bdrift = drift * 1.5;
            let iStart = Math.floor((camera.x - bdrift) / spacingX) - 1;
            let iEnd = Math.ceil((camera.x + canvas.width - bdrift) / spacingX) + 1;
            let jStart = Math.floor(camera.y / spacingY) - 1;
            let jEnd = Math.ceil((camera.y + canvas.height) / spacingY) + 1;
            for (let i = iStart; i <= iEnd; i++) {
                for (let j = jStart; j <= jEnd; j++) {
                    let seed = Math.abs(Math.sin(i * 34.55 + j * 91.7) * 21943.15);
                    seed -= Math.floor(seed);

            ctx.ellipse(cx + size * 0.65, cy + size * 0.12, size * 0.68, size * 0.42, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draws the animated water/lava/ice noise texture within a square region roughly `span`
        // wide, respecting whatever clip is already active on ctx. Shared by the small hazard
        // pockets that fill hex holes.
        function drawHazardTexture(cx, cy, span) {
            let hz = currentTheme.hazard;
            ctx.save();
            ctx.strokeStyle = hz.edge; ctx.fillStyle = hz.edge;
            if (hz.type === 'water') { ctx.globalAlpha = 0.3; ctx.lineWidth = 3; }
            else if (hz.type === 'lava') { ctx.globalAlpha = 0.4; }
            else if (hz.type === 'ice') { ctx.globalAlpha = 0.3; ctx.lineWidth = 2; }
            ctx.beginPath();
            for (let x = cx - span; x < cx + span; x += 40) {
                for (let y = cy - span; y < cy + span; y += 40) {
                    let noise = Math.sin(x*0.01 + Date.now()/500) + Math.cos(y*0.01 + Date.now()/400);
                    if (hz.type === 'water') { ctx.moveTo(x + noise*7 + (7 + noise*2), y + noise*7); ctx.arc(x + noise*7, y + noise*7, 7 + noise*2, 0, Math.PI*2); }

                    else if (hz.type === 'ice') { ctx.moveTo(x, y); ctx.lineTo(x + 16 + noise*5, y + 11 + noise*5); }

            ctx.restore();
        }

        // Hazard (water/lava/ice) only ever fills the interior holes left by hex generation -
        // never the outer edge of the map, which is sky instead (see drawSkyBackground).
        function drawHazardHoles() {
            let hz = currentTheme.hazard;
            let buf = HEX_SIZE * 2;
            // PERF: same grid-narrowing as computeVisibleLandTiles - only check candidates from
            // cells overlapping the viewport instead of every hole in the level.
            let candidates = getHoleTilesInView(
                camera.x - buf, camera.y - buf,
                camera.x + canvas.width + buf, camera.y + canvas.height + buf
            );
            for (let ti = 0; ti < candidates.length; ti++) {
                let tile = candidates[ti];
                if (!isOnScreen(tile.x, tile.y, buf)) continue;
                let c = cachedHexCorners(tile);
                ctx.save();
                ctx.beginPath(); ctx.moveTo(c[0].x, c[0].y); for (let i = 1; i < 6; i++) ctx.lineTo(c[i].x, c[i].y); ctx.closePath();
                ctx.fillStyle = hz.color; ctx.fill();

                ctx.restore();
                ctx.save();
                ctx.lineWidth = 4; ctx.strokeStyle = hz.edge;
                ctx.beginPath(); ctx.moveTo(c[0].x, c[0].y); for (let i = 1; i < 6; i++) ctx.lineTo(c[i].x, c[i].y); ctx.closePath(); ctx.stroke();
                ctx.restore();
            }
        }

        function drawCharacterModel(x, y, vx, vy, radius, colorId, isJiggling, hatId, targetCtx) {

            let renderY = y; let speed = Math.sqrt(vx * vx + vy * vy);
            let wobble = Math.sin(Date.now() / 60) * speed * 0.04;
            let stretchX = Math.max(0.5, Math.min(1 + Math.abs(vx) * 0.06 + wobble, 2.0));
            let stretchY = Math.max(0.5, Math.min(1 + Math.abs(vy) * 0.06 - wobble, 2.0));
            let leanX = Math.max(-18, Math.min(18, -vx * 1.4));
            let leanY = Math.max(-18, Math.min(18, -vy * 1.4));
            let t = Date.now();
            
            // Resolve Color / Animations
            let fillColor = '#00ffcc'; // Fallback
            let drawSpecial = null;
            
            let basicMatch = basicSkinsById.get(colorId);
            if (basicMatch) fillColor = basicMatch.color;
            else if (colorId === 'rainbow') { fillColor = `hsl(${(t / 5) % 360}, 100%, 50%)`; drawSpecial = 'rainbow'; }
            else if (colorId === 'gold') {

                grad.addColorStop(0, '#bf953f'); grad.addColorStop(0.5, '#fcf6ba'); grad.addColorStop(1, '#b38728');

            } else if (drawSpecial === 'void') {

                c.strokeStyle = 'rgba(155,89,182,0.5)'; c.lineWidth=1; c.beginPath(); c.arc(0,0, r*1.05 + Math.sin(t/130)*3, 0, Math.PI*2); c.stroke();
            } else if (drawSpecial === 'sparkle' && Math.random() < 0.6) {

                c.beginPath(); c.arc((Math.random()-0.5)*r*1.5, (Math.random()-0.5)*r*1.5, 2, 0, Math.PI*2); c.fill();
            } else if (drawSpecial === 'lava') {
                c.strokeStyle = `rgba(255, ${180 + Math.sin(t/120)*60}, 40, 0.9)`; c.lineWidth = 1.5;

            } else if (drawSpecial === 'ice') {

                for (let i=0; i<3; i++) {
                    let cx = (Math.sin(i*2.3) + (i-1)*0.5) * r*0.5, cy = Math.cos(i*1.7) * r*0.5;
                    c.beginPath(); c.moveTo(cx-4, cy); c.lineTo(cx+4, cy); c.moveTo(cx, cy-4); c.lineTo(cx, cy+4);

            } else if (drawSpecial === 'glitch') {
                c.save(); c.globalAlpha = 0.5; c.fillStyle = Math.random() > 0.5 ? '#0ff' : '#f0f';

            c.beginPath(); c.arc(-8*(radius/22) + eyeOffsetX, -6*(radius/22) + eyeOffsetY, 4*(radius/22), 0, Math.PI*2); c.fill();

                    // these draw independently of whatever tree/rock/coin/chest sits at center.
                    let f = item.obj;
                    let angle = Math.atan2(f.y2 - f.y1, f.x2 - f.x1);
                    let len = Math.hypot(f.x2 - f.x1, f.y2 - f.y1);
                    ctx.save(); ctx.translate(f.midX, f.midY); ctx.rotate(angle);
                    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(-len/2, 5, len, 4);
                    ctx.fillStyle = '#8a5a2b';
                    ctx.fillRect(-len/2 - 2, -14, 5, 20);
                    ctx.fillRect(len/2 - 3, -14, 5, 20);
                    ctx.fillStyle = '#a97a3c';
                    ctx.fillRect(-len/2, -10, len, 4);
                    ctx.fillRect(-len/2, -2, len, 4);
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
                    ctx.strokeRect(-len/2, -10, len, 4); ctx.strokeRect(-len/2, -2, len, 4);
                    ctx.restore();
                }
                else if (item.type === 'hive') {
                    let h = item.obj;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(h.x, h.y + h.radius, h.radius, h.radius*0.5, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#d35400'; ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(h.x, h.y - 10, h.radius*0.8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.arc(h.x, h.y - 20, h.radius*0.6, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(h.x, h.y, 8, 12, 0, 0, Math.PI*2); ctx.fill();
                }
                else if (item.type === 'coin' || item.type === 'ruby' || item.type === 'sapphire' || item.type === 'emerald') {
                    // Loot sprites now live one-per-file under sprites/loot-<type>.js and
                    // register themselves on window.LootSprites, keyed by item type — same
                    // dispatch pattern as window.EnemySprites for enemies (SECTION 8 below)
                    // and window.IconSprites for UI icons (SECTION 4).
                    let c = item.obj;
                    if (window.LootSprites && window.LootSprites[item.type]) window.LootSprites[item.type](ctx, c);
                }
                else if (item.type === 'powerup') {
                    let p = item.obj; let pu = powerupTypesById.get(p.typeId); let bob = Math.sin(Date.now()/260 + (p.spawnSeed||0)) * 6; let spin = (Date.now()/450) % (Math.PI*2);
                    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(p.x, p.y + p.radius*0.9, p.radius*0.9, p.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
                    ctx.save(); ctx.globalAlpha = 0.2 + 0.15*Math.sin(Date.now()/250); ctx.fillStyle = pu.color; ctx.beginPath(); ctx.arc(p.x, p.y + bob, p.radius*1.7, 0, Math.PI*2); ctx.fill(); ctx.restore();
                    ctx.save(); ctx.translate(p.x, p.y + bob); ctx.rotate(spin); ctx.fillStyle = pu.color; ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); ctx.rotate(-spin); drawPixelIcon(pu.id, ctx, 0, 1, p.radius*1.3); ctx.restore();
                }
                else if (item.type === 'chest') {
                    let c = item.obj;
                    if (!c.collected) { ctx.save(); ctx.globalAlpha = 0.15 + 0.1*Math.sin(Date.now()/400); ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(c.x, c.y, c.radius*1.8, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(c.x, c.y + c.radius, c.radius, c.radius*0.5, 0, 0, Math.PI*2); ctx.fill();
                    if (!c.collected) {
                        ctx.fillStyle = '#8b4513'; ctx.beginPath(); ctx.roundRect(c.x - c.radius, c.y - c.radius*0.5, c.radius*2, c.radius*1.5, 5); ctx.fill();
                        ctx.fillStyle = '#d4a017'; ctx.fillRect(c.x - c.radius, c.y, c.radius*2, 5);
                        ctx.fillStyle = '#ffcf33'; ctx.beginPath(); ctx.arc(c.x, c.y + 2, 4, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.fillStyle = '#6b3410'; ctx.beginPath(); ctx.roundRect(c.x - c.radius, c.y - c.radius*1.5, c.radius*2, c.radius, 5); ctx.fill();
                        ctx.fillStyle = '#8b4513'; ctx.beginPath(); ctx.roundRect(c.x - c.radius, c.y - c.radius*0.5, c.radius*2, c.radius*1.5, 5); ctx.fill();
                        ctx.fillStyle = '#3a1c08'; ctx.fillRect(c.x - c.radius + 3, c.y - c.radius*0.5 + 3, c.radius*2 - 6, c.radius*1.5 - 10);
                    }
                }
                else if (item.type === 'leaf') {
                    let l = item.obj;
                    ctx.save(); ctx.globalAlpha = Math.max(0, l.life); ctx.fillStyle = l.color; ctx.translate(l.x, l.y);
                    ctx.rotate(l.seed * Math.PI * 2 + Date.now()/200 * (l.seed > 0.5 ? 1 : -1)); ctx.beginPath(); ctx.ellipse(0, 0, 4, 2, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
                }
                else if (item.type === 'splash') {
                    let s = item.obj;
                    ctx.save(); ctx.globalAlpha = Math.max(0, s.life / s.maxLife); ctx.fillStyle = s.color; ctx.strokeStyle = s.color;
                    if (s.type === 'ripple') { ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(s.x, s.y, 10 + (1 - s.life/s.maxLife)*35, 0, Math.PI*2); ctx.stroke(); } 
                    else { ctx.beginPath(); ctx.arc(s.x, s.y, 2 + (s.life/s.maxLife)*4, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore();
                }
                else if (item.type === 'projectile') {
                    let p = item.obj;
                    ctx.fillStyle = p.deflected ? '#ff477e' : '#ff0055'; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x-2, p.y-2, p.radius*0.4, 0, Math.PI*2); ctx.fill();
                }
                else if (item.type === 'icicle') {
                    let ic = item.obj;
                    ctx.save(); ctx.translate(ic.x, ic.y); ctx.rotate(ic.angle);
                    // PERF: this gradient is drawn entirely in local (post-translate/rotate)
                    // space with fixed coordinates (-14,0)-(10,0) and fixed color stops - it is
                    // byte-for-byte identical on every single icicle, every single frame. It was
                    // being recreated from scratch per-icicle per-frame (a burst item like
                    // Spikes can have 10+ alive at once); building it once and reusing the same
                    // CanvasGradient object is free and visually identical.
                    if (!icicleGradientCache) {
                        icicleGradientCache = ctx.createLinearGradient(-14, 0, 10, 0);
                        icicleGradientCache.addColorStop(0, 'rgba(127,219,255,0)'); icicleGradientCache.addColorStop(1, '#e8fbff');
                    }
                    ctx.fillStyle = icicleGradientCache;
                    ctx.beginPath(); ctx.moveTo(-14, -3); ctx.lineTo(8, -1.5); ctx.lineTo(12, 0); ctx.lineTo(8, 1.5); ctx.lineTo(-14, 3); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = '#0a2e44'; ctx.lineWidth = 0.6; ctx.stroke(); ctx.restore();
                }
                else if (item.type === 'flame') {
                    let f = item.obj; let alpha = Math.max(0, f.life / f.maxLife);
                    ctx.save(); ctx.globalAlpha = alpha; ctx.translate(f.x, f.y);
                    // PERF: was ctx.createRadialGradient(f.x, f.y, ...) - a brand new gradient
                    // object per flame particle per frame, at every world position they ever
                    // occupy (so it could never be reused). Translating to the particle's
                    // position first and building the gradient in local (0,0) space instead
                    // means the only thing that actually changes its appearance is `size` -
                    // bucketing by rounded size lets every flame particle share a small, fixed
                    // pool of cached gradients instead of allocating a fresh one each frame.
                    let sizeKey = Math.max(1, Math.round(f.size));
                    let grad = flameGradientCache.get(sizeKey);
                    if (!grad) {
                        grad = ctx.createRadialGradient(0, 0, 0, 0, 0, sizeKey);
                        grad.addColorStop(0, '#fff3b0'); grad.addColorStop(0.5, '#ff9f1c'); grad.addColorStop(1, '#ff6b35');
                        flameGradientCache.set(sizeKey, grad);
                    }
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(0, 0, f.size * alpha, 0, Math.PI*2); ctx.fill(); ctx.restore();
                }
                else if (item.type === 'enemy') {
                    let e = item.obj;
                    // Blend this enemy's rendered position between its previous and current
                    // physics-tick position for the duration of the sprite's draw call, then
                    // restore the real simulation values. Actual per-type drawing (body, state
                    // animation, and shadow) now lives in sprites/<type>.js, loaded via
                    // <script src> tags and exposed on the global EnemySprites object.
                    let realEX = e.x, realEY = e.y;
                    if (e.prevX !== undefined) {
                        e.x = e.prevX + (realEX - e.prevX) * renderAlpha;
                        e.y = e.prevY + (realEY - e.prevY) * renderAlpha;
                    }
                    let sprite = window.EnemySprites && window.EnemySprites[e.type];
                    if (sprite) sprite(ctx, e, player);
                    e.x = realEX; e.y = realEY;
                }
                else if (item.type === 'companion') {
                    let cs = item.obj;
                    let ccx = cs.prevX !== undefined ? cs.prevX + (cs.x - cs.prevX) * renderAlpha : cs.x;
                    let ccy = cs.prevY !== undefined ? cs.prevY + (cs.y - cs.prevY) * renderAlpha : cs.y;
                    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(ccx, ccy + cs.radius*0.8, cs.radius*0.8, cs.radius*0.35, 0, 0, Math.PI*2); ctx.fill();
                    drawCharacterModel(ccx, ccy, 0, 0, cs.radius, cs.colorId, false, null);
                }
                else if (item.type === 'player') {
                    let p = item.obj;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(pdrawX, pdrawY + p.radius, p.radius * 0.9, p.radius * 0.4, 0, 0, Math.PI*2); ctx.fill();
                    if (p.activePowerup === 'rampage') {
                        ctx.save();
                        ctx.translate(pdrawX, pdrawY);
                        let auraPulse = Math.sin(Date.now()/50) * 10;
                        let grad = ctx.createRadialGradient(0, 0, p.radius, 0, 0, p.radius * 2 + auraPulse);
                        grad.addColorStop(0, 'rgba(255, 71, 126, 0.8)'); grad.addColorStop(1, 'rgba(255, 71, 126, 0)');
                        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, p.radius * 2 + auraPulse, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    }
                    if (p.activePowerup === 'lightning') {
                        let target = getLightningTargetWorld();
                        drawLightningBolt(pdrawX, pdrawY, target.x, target.y);
                    }
                    drawCharacterModel(pdrawX, pdrawY, p.vx, p.vy, p.radius, p.color, Math.abs(p.jiggleForceX) + Math.abs(p.jiggleForceY) > 0, p.hat);
                    // Roguelite: Shuriken item - orbiting blades drawn around the player
                    let shurikenStacksDraw = runItems.shuriken || 0;
                    if (shurikenStacksDraw > 0) {
                        let orbitRadius = p.radius + 34;
                        for (let s = 0; s < shurikenStacksDraw; s++) {
                            let ang = shurikenSpin + (s / shurikenStacksDraw) * Math.PI * 2;
                            let sx = pdrawX + Math.cos(ang) * orbitRadius;
                            let sy = pdrawY + Math.sin(ang) * orbitRadius;
                            ctx.save(); ctx.translate(sx, sy); ctx.rotate(shurikenSpin * 4);
                            drawPixelIcon('shuriken', ctx, 0, 0, 33);
                            ctx.restore();
                        }
                    }
                }
                
                if (isWaterObj) { ctx.restore(); }
            });
            ctx.restore(); 
            ctx.restore();

            if (gameState === 'playing' && goal.active && timeLeft <= MAX_TIME / 2) {
                const screenBuffer = 50;
                if (goal.x < camera.x - screenBuffer || goal.x > camera.x + canvas.width + screenBuffer || goal.y < camera.y - screenBuffer || goal.y > camera.y + canvas.height + screenBuffer) {
                    let angle = Math.atan2(goal.y - player.worldY, goal.x - player.worldX);
                    let radius = Math.min(canvas.width / 2, canvas.height / 2) - 40;
                    ctx.save();
                    ctx.translate(canvas.width / 2 + Math.cos(angle) * radius, canvas.height / 2 + Math.sin(angle) * radius); ctx.rotate(angle);
                    ctx.fillStyle = goal.collected < goal.required ? '#999999' : '#ffcf33'; ctx.strokeStyle = goal.collected < goal.required ? '#666666' : '#d4a017';
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-5, 0); ctx.lineTo(-15, -15); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
                }
            }
            

                    if (gameState === 'playing' && player.activePowerup === 'lightning') {
                        ctx.fillStyle = 'rgba(249, 233, 78, 0.5)';
                        ctx.beginPath(); ctx.arc(pointerScreenX, pointerScreenY, 15 + Math.sin(Date.now()/40)*5, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#fffbe0'; ctx.lineWidth = 2; ctx.beginPath();
                        ctx.moveTo(pointerScreenX - 25, pointerScreenY);
                        ctx.lineTo(pointerScreenX + 25, pointerScreenY);
                        ctx.moveTo(pointerScreenX, pointerScreenY - 25); ctx.lineTo(pointerScreenX, pointerScreenY + 25); ctx.stroke();
                    }
        
                    if (gameState === 'title' || gameState === 'game_over') {
                        document.getElementById('ui-layer').style.display = 'none';
                        document.getElementById('hazard-warning').style.display = 'none';
                    }
                    
                    // requestAnimationFrame(draw) removed! It is now handled centrally in Section 9.
                }

        // ==========================================
        // SECTION 9 - INITIALIZATION & MAIN LOOP
        // Setup triggers, game resets, and start interval.
        // ==========================================
        function startGame() {
            document.getElementById('title-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            document.querySelectorAll('.corner-icon').forEach(el => el.style.display = 'flex');
            gameState = 'playing'; camera.x = player.worldX - canvas.width / 2;
            camera.y = player.worldY - canvas.height / 2;
            camera.prevX = camera.x; camera.prevY = camera.y;
            // Unlock/build the audio graph directly off this click, then load the level's own
            // track straight away - previously this went through initAudio() (which picks a
            // random *title* track) immediately followed by a second track load to correct it,
            // two rapid back-to-back src/currentTime/play() resets on both music elements that
            // could leave the "fast" element stalled or out of sync by the time it was needed.
            if (!audioGraphReady) setupAudioGraph();
            if (actx.state === 'suspended') actx.resume();
            if (levelPreGenerated) {
                // Level 1 was already fully generated at page load and is sitting ready to go -
                // just make sure its track is loaded now that this user gesture has unlocked
                // audio, rather than throwing the pre-built level away and generating a new one.
                levelPreGenerated = false;
                playMusicTrack((level - 1) % musicFiles.length);
            } else {
                generateLevel();
            }
        }

        function resetGame() {
            level = 1;
            score = 0; player.worldX = 0; player.worldY = 0; player.prevWorldX = 0; player.prevWorldY = 0; player.vx = 0; player.vy = 0; player.hazardTimer = 0;
            player.activePowerup = null; player.powerupDuration = 0; player.powerupTimeLeft = 0; player.spikesTimer = 0;
            projectiles = []; icicles = []; flameParticles = [];
            splashes = []; leaves = []; screenShake = 0; hives = [];
            runItems = {}; companions = []; playerTrail = []; shurikenSpin = 0;
            updateItemsHUD();
            document.getElementById('hazard-warning').style.display = 'none';
            lastCountdownSecond = -1;
            musicSped = false;
            if (domRefs.timeCountdown) domRefs.timeCountdown.style.display = 'none';
            updateHazardVignette(0);
        }

        function triggerGameOver(reason) {
            if (gameState === 'game_over') return;
            gameState = 'game_over';
            flushCoinsIfDirty();
            document.getElementById('ui-layer').style.display = 'none'; document.getElementById('hazard-warning').style.display = 'none';
            // Almanac and Settings corner icons are intentionally left visible here so the player can
            // still check what killed them or adjust settings from the Game Over screen.
            document.getElementById('game-over-screen').style.display = 'flex';
            lastCountdownSecond = -1;
            setMusicDanger(false);
            updateHazardVignette(0);
            if (level > highestLevel) { highestLevel = level; storage.set('landSlidersBestLevel', highestLevel);
            }
            document.getElementById('go-level').innerText = level; document.getElementById('go-best').innerText = highestLevel;
            if (reason === 'time') document.getElementById('death-reason').innerText = "Out of Time!";
            else if (reason === 'hazard') { document.getElementById('death-reason').innerText = "Fell into the abyss!";
            }
            else { 
                document.getElementById('death-reason').innerText = `Killed by: ${enemyDB[reason].name}`;
                unlockAlmanacEntry(reason);
            }
        }


        function unlockAlmanacEntry(enemyId) {
            let key = 'almanac_' + enemyId;
            if (storage.get(key) !== 'true') {
                storage.set(key, 'true');
                let popup = document.getElementById('unlock-popup');
                popup.classList.remove('pop-anim');
                requestAnimationFrame(() => requestAnimationFrame(() => popup.classList.add('pop-anim')));
            }
        }


        // ---- TEMPORARY PERF OVERLAY (v2 — clock/timestamp diagnostic) ----
        // Hidden by default now. Click the "Remove Hat" button in the shop's Hats tab 20 times
        // in a row to toggle it on/off (see removeHatClickCount in SECTION 6).
        const perfOverlay = document.createElement('div');
        perfOverlay.id = 'perf-overlay';
        perfOverlay.style.cssText = 'display:none;position:fixed;top:4px;left:4px;z-index:9999;background:rgba(0,0,0,0.75);color:#0f0;font-family:monospace;font-size:11px;padding:4px 6px;border-radius:4px;pointer-events:none;white-space:pre;line-height:1.4;';
        perfOverlay.innerText = 'perf: warming up...';
        document.body.appendChild(perfOverlay);

        let perfStats = {
            update: 0, draw: 0, pixelate: 0, frames: 0, catchUpHits: 0,
            totalSteps: 0,                 // total update() calls in this window
            rafDeltaSum: 0,                // sum of (currentTime - lastTime) as rAF reports it
            wallDeltaSum: 0,                // sum of independently-measured wall time via performance.now()
            windowStart: performance.now()
        };
        let lastWallNow = performance.now();

        function reportPerfIfReady() {
            perfStats.frames++;
            const elapsed = performance.now() - perfStats.windowStart;
            if (elapsed >= 1000) {
                const n = perfStats.frames;
                const fps = (n / (elapsed / 1000)).toFixed(1);
                const avgUpdate = (perfStats.update / n).toFixed(2);
                const avgDraw = (perfStats.draw / n).toFixed(2);
                const avgPixelate = (perfStats.pixelate / n).toFixed(2);
                const avgTotal = (parseFloat(avgUpdate) + parseFloat(avgDraw) + parseFloat(avgPixelate)).toFixed(2);
                // "effective sim Hz": how many update() ticks actually ran per real second.
                // Should be ~60 regardless of render fps if the sim clock is keeping up.
                const simHz = (perfStats.totalSteps / (elapsed / 1000)).toFixed(1);
                // Compares rAF's own timestamp deltas against an independently measured wall
                // clock over the same window. If these diverge, rAF's timestamp isn't trustworthy
                // for driving the sim clock under throttling, and that mismatch is the leak.
                const rafMs = perfStats.rafDeltaSum.toFixed(0);
                const wallMs = perfStats.wallDeltaSum.toFixed(0);
                const driftPct = perfStats.wallDeltaSum > 0
                    ? (((perfStats.wallDeltaSum - perfStats.rafDeltaSum) / perfStats.wallDeltaSum) * 100).toFixed(1)
                    : '0.0';
                perfOverlay.innerText =
                    `fps: ${fps}   sim Hz: ${simHz} (target 60)\n` +
                    `update:    ${avgUpdate}ms\n` +
                    `draw:      ${avgDraw}ms\n` +
                    `pixelate:  ${avgPixelate}ms\n` +
                    `total:     ${avgTotal}ms  (budget 16.6ms)\n` +
                    `catchup-maxed: ${perfStats.catchUpHits}/${n}\n` +
                    `rAF-clock ms: ${rafMs}   wall-clock ms: ${wallMs}   drift: ${driftPct}%\n` +
                    `entities: t${trees.length} e${enemies.length} i${items.length} d${decorations.length}`;
                perfStats = { update: 0, draw: 0, pixelate: 0, frames: 0, catchUpHits: 0, totalSteps: 0, rafDeltaSum: 0, wallDeltaSum: 0, windowStart: performance.now() };
            }
        }
        // ---- END TEMPORARY PERF OVERLAY ----

        let lastTime = performance.now();
        let accumulator = 0;
        const timeStep = 1000 / 60;
        const maxCatchUpSteps = 15;
        // Fraction (0-1) of a timestep left in the accumulator after this frame's fixed updates
        // have run. draw() (SECTION 8) uses this to blend rendered positions between the
        // previous and current physics tick, which is what actually removes the jitter caused by
        // an uneven number of steps landing between rendered frames - e.g. under throttled rAF /
        // Low Power Mode - without changing physics/game logic at all.
        let renderAlpha = 1;

        function renderPixelated() {
            pixelCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
            pixelCtx.drawImage(canvas, 0, 0, pixelCanvas.width, pixelCanvas.height);
            displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
            displayCtx.drawImage(pixelCanvas, 0, 0, pixelCanvas.width, pixelCanvas.height, 0, 0, displayCanvas.width, displayCanvas.height);
        }

        function gameLoop(currentTime) {
            // Independent wall-clock measurement, taken fresh right here rather than trusting
            // the rAF-supplied timestamp, purely to compare the two against each other.
            let wallNow = performance.now();
            let wallDelta = wallNow - lastWallNow;
            lastWallNow = wallNow;
            perfStats.wallDeltaSum += wallDelta;

            let rafDelta = currentTime - lastTime;
            perfStats.rafDeltaSum += rafDelta;

            accumulator += rafDelta;
            lastTime = currentTime;

            let tUpdateStart = performance.now();
            let steps = 0;
            while (accumulator >= timeStep && steps < maxCatchUpSteps) {
                update();
                accumulator -= timeStep;
                steps++;
            }
            if (steps === maxCatchUpSteps) { accumulator = 0; perfStats.catchUpHits++; }
            perfStats.totalSteps += steps;
            let tUpdateEnd = performance.now();

            // Leftover fraction of a timestep, used by draw() to interpolate rendered positions
            // between the previous and current physics tick (see SECTION 8).
            renderAlpha = Math.min(1, accumulator / timeStep);

            draw();
            let tDrawEnd = performance.now();
            renderPixelated();
            let tPixelateEnd = performance.now();

            perfStats.update += (tUpdateEnd - tUpdateStart);
            perfStats.draw += (tDrawEnd - tUpdateEnd);
            perfStats.pixelate += (tPixelateEnd - tDrawEnd);
            reportPerfIfReady();

            requestAnimationFrame(gameLoop);
        }

        // Generate the first level immediately so it's fully ready the moment the player taps
        // Play, instead of building it inside the click handler where any delay is felt as
        // input lag. gameState is still 'title' at this point and update() only advances real
        // gameplay logic (timer, enemies, spawns, etc.) once gameState === 'playing', so the
        // world exists but the game itself stays paused until startGame() runs.
        generateLevel();
        levelPreGenerated = true;

        requestAnimationFrame(gameLoop);

    </script>
